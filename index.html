<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwiftCourier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f4f4f5; }
        .mobile-container { max-width: 420px; margin: 0 auto; background: white; min-height: 100vh; position: relative; overflow: hidden; }
        .animate-slideUp { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        #splash-screen { position: absolute; inset: 0; z-index: 100; background: #000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="mobile-container">
    <div id="splash-screen">
        <i class="fa-solid fa-box-open text-white text-6xl animate-bounce"></i>
    </div>

    <div id="selection-sheet" class="absolute inset-0 z-50 bg-black/50 flex items-end">
        <div class="bg-white w-full rounded-t-3xl p-8 animate-slideUp">
            <h2 class="text-2xl font-bold mb-6">What are you sending?</h2>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startFlow('Document')" class="p-6 border rounded-2xl flex flex-col items-center hover:bg-zinc-50 transition">
                    <i class="fa-solid fa-file-lines text-3xl mb-3 text-blue-600"></i>
                    <span class="font-semibold">Document</span>
                </button>
                <button onclick="startFlow('Parcel')" class="p-6 border rounded-2xl flex flex-col items-center hover:bg-zinc-50 transition">
                    <i class="fa-solid fa-box text-3xl mb-3 text-orange-500"></i>
                    <span class="font-semibold">Parcel</span>
                </button>
            </div>
        </div>
    </div>

    <div id="app-content" class="p-6 hidden">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-bold">SwiftCourier</h1>
            <button onclick="location.reload()" class="text-sm font-semibold text-blue-600">New</button>
        </header>

        <div class="space-y-4">
            <div class="p-4 border rounded-2xl flex items-center gap-4">
                <div class="bg-blue-100 p-3 rounded-full"><i class="fa-solid fa-location-dot text-blue-600"></i></div>
                <div>
                    <p class="text-xs text-zinc-500 uppercase font-bold">Pickup</p>
                    <p class="font-semibold">Current Location</p>
                </div>
            </div>

            <div class="p-4 border rounded-2xl flex items-center gap-4">
                <div class="bg-orange-100 p-3 rounded-full"><i class="fa-solid fa-flag text-orange-500"></i></div>
                <input type="text" placeholder="Enter destination..." class="w-full focus:outline-none font-semibold">
            </div>
        </div>

        <button class="w-full mt-8 bg-black text-white py-4 rounded-2xl font-bold text-lg active:scale-95 transition" onclick="alert('Courier Dispatched!')">
            Request Courier
        </button>
    </div>
</div>

<script>
    // Splash logic
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
        }, 2000);
    };

    function startFlow(type) {
        document.getElementById('selection-sheet').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        console.log("Starting courier flow for:", type);
    }
</script>
</body>
</html>
