<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Courier Go</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .map-bg { background: #e4e4e7; height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        #splash { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .sheet { position: absolute; bottom: 0; width: 100%; max-width: 420px; background: white; border-radius: 24px 24px 0 0; padding: 24px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="splash">
        <i class="fa-solid fa-truck-fast text-white text-7xl mb-4"></i>
        <h1 class="text-white text-3xl font-bold tracking-tight">CourierGo</h1>
    </div>

    <div class="map-bg">
        <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?w=800&q=80" class="w-full h-full object-cover grayscale opacity-60">
        <i class="fa-solid fa-location-dot text-black text-4xl absolute"></i>
    </div>

    <div class="sheet">
        <h2 class="text-xl font-bold mb-4">Send a package</h2>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="selectPackage('Envelope')" class="border-2 border-zinc-200 p-4 rounded-2xl hover:border-black transition">
                <i class="fa-solid fa-envelope text-2xl mb-2"></i><br>Envelope
            </button>
            <button onclick="selectPackage('Box')" class="border-2 border-zinc-200 p-4 rounded-2xl hover:border-black transition">
                <i class="fa-solid fa-box text-2xl mb-2"></i><br>Package
            </button>
        </div>
        <input type="text" placeholder="Where to?" class="w-full bg-zinc-100 p-4 rounded-xl mb-4 focus:outline-none">
        <button class="w-full bg-black text-white p-4 rounded-xl font-bold text-lg active:scale-95 transition">Request Courier</button>
    </div>

    <script>
        // Splash animation
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
            }, 2000);
        };

        function selectPackage(type) {
            alert("Ready to send: " + type);
        }
    </script>
</body>
</html>
