<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CourierGo</title>

    <!-- Mapbox -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; background: #111; }

        /* ── Map ───────────────────────────────────────────── */
        #map { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
        .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }

        /* ── Splash ────────────────────────────────────────── */
        #splash {
            position: fixed; inset: 0; z-index: 200;
            background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        #splash.hide { opacity: 0; pointer-events: none; }

        /* ── User Avatar Marker ────────────────────────────── */
        .user-marker-wrap {
            position: relative;
            width: 52px; height: 52px;
            cursor: default;
        }
        .user-marker-pulse {
            position: absolute; inset: 0;
            border-radius: 50%;
            background: rgba(0,0,0,0.12);
            animation: pulse 2.2s ease-out infinite;
        }
        .user-marker-avatar {
            position: absolute; inset: 6px;
            border-radius: 50%;
            border: 2.5px solid #fff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.35);
            overflow: hidden;
            background: #18181b;
            display: flex; align-items: center; justify-content: center;
        }
        .user-marker-avatar img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .user-marker-avatar .avatar-initials {
            color: #fff; font-size: 13px; font-weight: 700; letter-spacing: -0.3px;
        }
        .user-marker-caret {
            position: absolute; bottom: -7px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-top: 9px solid #fff;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
        }
        @keyframes pulse {
            0%   { transform: scale(0.85); opacity: 0.6; }
            60%  { transform: scale(1.5);  opacity: 0; }
            100% { transform: scale(1.5);  opacity: 0; }
        }

        /* ── Destination Markers ───────────────────────────── */
        .dest-marker {
            width: 34px; height: 34px; border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            border: 2.5px solid #fff;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        .dest-marker i { transform: rotate(45deg); font-size: 13px; color: #fff; }
        .dest-marker.pickup  { background: #18181b; }
        .dest-marker.dropoff { background: #3b82f6; }

        /* ── Top Search Panel ──────────────────────────────── */
        #search-panel {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 420px;
            z-index: 50;
            padding: 52px 16px 12px;
        }
        .search-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            overflow: visible;
        }
        .search-row {
            display: flex; align-items: center;
            padding: 13px 16px;
            gap: 10px;
            position: relative;
        }
        .search-row + .search-row {
            border-top: 1px solid #f1f1f4;
        }
        .search-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }
        .search-dot.pickup  { background: #18181b; border: 2px solid #18181b; }
        .search-dot.dropoff { background: #3b82f6; border: 2px solid #3b82f6; }
        .search-input {
            flex: 1; border: none; background: transparent;
            font-size: 13px; font-weight: 500; color: #18181b;
            outline: none; min-width: 0;
        }
        .search-input::placeholder { color: #a1a1aa; font-weight: 400; }
        .search-clear {
            width: 20px; height: 20px; border-radius: 50%; background: #e4e4e7;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            font-size: 9px; color: #71717a;
            border: none;
        }
        .search-clear.visible { display: flex; }
        .search-divider-line {
            position: absolute; left: 23px; top: 100%; width: 1px; height: 1px;
            background: #d4d4d8;
        }

        /* Autocomplete Dropdown */
        .suggestions-box {
            position: absolute; top: calc(100% + 6px); left: 0; right: 0;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.14);
            overflow: hidden;
            z-index: 100;
            max-height: 240px;
            overflow-y: auto;
        }
        .suggestion-item {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 14px;
            cursor: pointer;
            transition: background 0.12s;
        }
        .suggestion-item:hover { background: #f4f4f5; }
        .suggestion-item + .suggestion-item { border-top: 1px solid #f4f4f5; }
        .sugg-icon { width: 30px; height: 30px; border-radius: 8px; background: #f4f4f5; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; color: #52525b; }
        .sugg-text-main { font-size: 12px; font-weight: 600; color: #18181b; line-height: 1.3; }
        .sugg-text-sub  { font-size: 11px; color: #a1a1aa; margin-top: 1px; }

        /* ── Bottom Sheet ──────────────────────────────────── */
        #sheet {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 420px;
            background: #fff;
            border-radius: 24px 24px 0 0;
            padding: 0 20px 32px;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
            z-index: 50;
            transition: transform 0.35s cubic-bezier(0.32,0,0.67,0);
        }
        #sheet.collapsed { transform: translateX(-50%) translateY(calc(100% - 72px)); }

        .sheet-handle-wrap {
            padding: 12px 0 8px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer;
        }
        .sheet-handle { width: 36px; height: 4px; border-radius: 4px; background: #d4d4d8; }

        /* Tabs */
        .tabs { background: #f4f4f5; padding: 3px; border-radius: 12px; display: flex; gap: 2px; margin-bottom: 16px; }
        .tab-btn {
            flex: 1; padding: 8px; font-size: 11.5px; font-weight: 700; border: none;
            border-radius: 9px; cursor: pointer; transition: all 0.18s;
            background: transparent; color: #71717a;
        }
        .tab-btn.active { background: #fff; color: #18181b; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

        /* Package Cards */
        .pkg-scroll { display: flex; gap: 10px; overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; margin: 0 -20px; padding: 2px 20px 12px; }
        .pkg-scroll::-webkit-scrollbar { display: none; }

        .pkg-card {
            flex-shrink: 0; width: 128px;
            border: 2px solid #e4e4e7; border-radius: 18px;
            padding: 12px; cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .pkg-card:hover { border-color: #a1a1aa; }
        .pkg-card.active { border-color: #18181b; background: #fafafa; }
        .pkg-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: #f4f4f5; display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #52525b; margin-bottom: 10px;
            transition: background 0.15s, color 0.15s;
        }
        .pkg-card.active .pkg-icon { background: #18181b; color: #fff; }
        .pkg-name { font-size: 12px; font-weight: 700; color: #18181b; }
        .pkg-weight { font-size: 10.5px; color: #71717a; margin-top: 2px; font-weight: 500; }
        .pkg-price-row { display: flex; align-items: baseline; justify-content: space-between; margin-top: 10px; padding-top: 8px; border-top: 1px solid #e4e4e7; }
        .pkg-price-label { font-size: 9.5px; color: #a1a1aa; }
        .pkg-price-val { font-size: 13px; font-weight: 800; color: #18181b; }

        /* Submit Button */
        #submitBtn {
            width: 100%; padding: 15px;
            border-radius: 14px; border: none;
            font-size: 13.5px; font-weight: 700;
            cursor: not-allowed;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s; margin-top: 4px;
            background: #e4e4e7; color: #a1a1aa;
        }
        #submitBtn.ready {
            background: #18181b; color: #fff;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }
        #submitBtn.ready:active { transform: scale(0.98); }

        /* Route Summary Bar (shown when both pins placed) */
        #route-bar {
            display: none;
            background: #f4f4f5; border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 12px;
            gap: 12px; align-items: center;
        }
        #route-bar.visible { display: flex; }
        .route-stat { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .route-stat-val { font-size: 14px; font-weight: 800; color: #18181b; }
        .route-stat-lbl { font-size: 10px; color: #71717a; font-weight: 500; margin-top: 1px; }
        .route-divider { width: 1px; height: 28px; background: #d4d4d8; }

        /* Tracking empty */
        .track-empty { text-align: center; padding: 28px 0 8px; color: #a1a1aa; font-size: 13px; }

        /* ── Toasts ────────────────────────────────────────── */
        #toast-container {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 32px); max-width: 388px;
            z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px;
            pointer-events: none;
        }
        .toast {
            width: 100%; padding: 13px 15px; border-radius: 14px;
            font-size: 12.5px; font-weight: 600;
            display: flex; align-items: flex-start; gap: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.13);
            opacity: 0; transform: translateY(-8px);
            transition: opacity 0.28s ease, transform 0.28s ease;
            pointer-events: auto; backdrop-filter: blur(12px);
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.hide { opacity: 0; transform: translateY(-8px); }
        .toast-success { background: rgba(255,255,255,0.97); border: 1.5px solid #bbf7d0; color: #15803d; }
        .toast-error   { background: rgba(255,255,255,0.97); border: 1.5px solid #fecaca; color: #b91c1c; }
        .toast-info    { background: rgba(255,255,255,0.97); border: 1.5px solid #bfdbfe; color: #1d4ed8; }
        .toast-icon { font-size: 14px; margin-top: 1px; flex-shrink: 0; }
        .toast-title { font-size: 12.5px; font-weight: 700; }
        .toast-msg  { font-size: 11.5px; opacity: 0.8; margin-top: 2px; }
    </style>
</head>
<body>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Splash -->
<div id="splash">
    <i class="fa-solid fa-truck-fast" style="color:#fff;font-size:64px;margin-bottom:16px;"></i>
    <h1 style="color:#fff;font-size:28px;font-weight:800;letter-spacing:-0.5px;">CourierGo</h1>
    <p style="color:#52525b;font-size:13px;margin-top:8px;font-weight:500;">Fast. Reliable. Tracked.</p>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Search Panel -->
<div id="search-panel">
    <div class="search-card" id="search-card">
        <!-- Pickup -->
        <div class="search-row" style="border-radius:20px 20px 0 0; position:relative;">
            <span class="search-dot pickup"></span>
            <input id="input-pickup" class="search-input" placeholder="Pickup location" autocomplete="off">
            <button id="clear-pickup" class="search-clear" onclick="clearInput('pickup')">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="sugg-pickup" class="suggestions-box" style="display:none;"></div>
        </div>
        <!-- Connector line visual -->
        <div style="height:1px;background:#f1f1f4;position:relative;">
            <div style="position:absolute;left:23px;top:-6px;width:1.5px;height:12px;background:#d4d4d8;"></div>
        </div>
        <!-- Dropoff -->
        <div class="search-row" style="border-radius:0 0 20px 20px; position:relative;">
            <span class="search-dot dropoff"></span>
            <input id="input-dropoff" class="search-input" placeholder="Delivery destination" autocomplete="off">
            <button id="clear-dropoff" class="search-clear" onclick="clearInput('dropoff')">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="sugg-dropoff" class="suggestions-box" style="display:none;"></div>
        </div>
    </div>
</div>

<!-- Bottom Sheet -->
<div id="sheet">
    <div class="sheet-handle-wrap" onclick="toggleSheet()">
        <div class="sheet-handle"></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button id="tab-send" class="tab-btn active" onclick="switchTab('send')">Send Package</button>
        <button id="tab-track" class="tab-btn" onclick="switchTab('track')">Activity</button>
    </div>

    <!-- Send View -->
    <div id="view-send">
        <!-- Route summary -->
        <div id="route-bar">
            <div class="route-stat">
                <span class="route-stat-val" id="route-dist">—</span>
                <span class="route-stat-lbl">Distance</span>
            </div>
            <div class="route-divider"></div>
            <div class="route-stat">
                <span class="route-stat-val" id="route-time">—</span>
                <span class="route-stat-lbl">Est. time</span>
            </div>
            <div class="route-divider"></div>
            <div class="route-stat">
                <span class="route-stat-val" id="route-price">—</span>
                <span class="route-stat-lbl">Base fare</span>
            </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">
            <h2 style="font-size:14px;font-weight:700;color:#18181b;">Package size</h2>
            <span style="font-size:10.5px;color:#a1a1aa;">Swipe →</span>
        </div>

        <div class="pkg-scroll">
            <div class="pkg-card" onclick="selectPackage(this,'Document',40)">
                <div>
                    <div class="pkg-icon"><i class="fa-solid fa-envelope"></i></div>
                    <div class="pkg-name">Document</div>
                    <div class="pkg-weight">Up to 1 kg</div>
                </div>
                <div class="pkg-price-row">
                    <span class="pkg-price-label">from</span>
                    <span class="pkg-price-val">R40</span>
                </div>
            </div>
            <div class="pkg-card" onclick="selectPackage(this,'Small Parcel',65)">
                <div>
                    <div class="pkg-icon"><i class="fa-solid fa-box-open"></i></div>
                    <div class="pkg-name">Small Parcel</div>
                    <div class="pkg-weight">Up to 5 kg</div>
                </div>
                <div class="pkg-price-row">
                    <span class="pkg-price-label">from</span>
                    <span class="pkg-price-val">R65</span>
                </div>
            </div>
            <div class="pkg-card" onclick="selectPackage(this,'Medium Box',110)">
                <div>
                    <div class="pkg-icon"><i class="fa-solid fa-box"></i></div>
                    <div class="pkg-name">Medium Box</div>
                    <div class="pkg-weight">Up to 15 kg</div>
                </div>
                <div class="pkg-price-row">
                    <span class="pkg-price-label">from</span>
                    <span class="pkg-price-val">R110</span>
                </div>
            </div>
            <div class="pkg-card" onclick="selectPackage(this,'Large Freight',180)">
                <div>
                    <div class="pkg-icon"><i class="fa-solid fa-pallet"></i></div>
                    <div class="pkg-name">Large Freight</div>
                    <div class="pkg-weight">Up to 30 kg</div>
                </div>
                <div class="pkg-price-row">
                    <span class="pkg-price-label">from</span>
                    <span class="pkg-price-val">R180</span>
                </div>
            </div>
        </div>

        <button id="submitBtn" onclick="confirmBooking()">
            <span id="submitLabel">Select pickup &amp; destination</span>
        </button>
    </div>

    <!-- Track View -->
    <div id="view-track" style="display:none;">
        <div class="track-empty">
            <i class="fa-solid fa-box-open" style="font-size:28px;display:block;margin-bottom:10px;opacity:0.3;"></i>
            No deliveries yet.<br>Your orders will appear here.
        </div>
    </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

/* ═══════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════ */
const MAPBOX_TOKEN = "pk.eyJ1Ijoia2F0bGVnb3BoYXNoYSIsImEiOiJjbTlpOTdzbmYwMGNsMmpzYWJtZzN4d3pqIn0.Zt-aSMEoahrV3zkiVVHbOw"; 
// ↑ Replace with your real Mapbox token

const firebaseConfig = {
    apiKey: "AIzaSyBQSPwpVbGrdCuOoyitAeWQHIeipj2MgIY",
    authDomain: "newstart-64c43.firebaseapp.com",
    databaseURL: "https://newstart-64c43-default-rtdb.firebaseio.com",
    projectId: "newstart-64c43",
    storageBucket: "newstart-64c43.firebasestorage.app",
    messagingSenderId: "941619830061",
    appId: "1:941619830061:web:de9e0f791eb8f6eacf87a4"
};

const SHIPDAY_API_KEY = "K5a8wQJF3f.az2zfrhgzwxK9JONI2y8";

/* ═══════════════════════════════════════════════════
   FIREBASE INIT
═══════════════════════════════════════════════════ */
const fbApp   = initializeApp(firebaseConfig);
const auth    = getAuth(fbApp);
const database = getDatabase(fbApp);

let currentUser = null;
onAuthStateChanged(auth, u => { if (u) currentUser = u; });
signInAnonymously(auth).catch(e => console.warn("Silent auth:", e.message));

async function ensureAuth() {
    if (currentUser) return currentUser;
    showToast('info', 'Signing you in…', 'Authenticating your session.');
    try {
        const cred = await signInAnonymously(auth);
        currentUser = cred.user;
        return currentUser;
    } catch (e) { throw new Error("Authentication failed: " + e.message); }
}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
function showToast(type, title, msg, duration = 4200) {
    const icons = { success:'fa-circle-check', error:'fa-circle-xmark', info:'fa-circle-info' };
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.innerHTML = `<i class="fa-solid ${icons[type]} toast-icon"></i>
        <div><div class="toast-title">${title}</div>${msg ? `<div class="toast-msg">${msg}</div>` : ''}</div>`;
    document.getElementById('toast-container').appendChild(t);
    requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
    setTimeout(() => { t.classList.add('hide'); t.addEventListener('transitionend', () => t.remove()); }, duration);
}

/* ═══════════════════════════════════════════════════
   MAP SETUP
═══════════════════════════════════════════════════ */
mapboxgl.accessToken = MAPBOX_TOKEN;

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [28.0473, -26.2041], // Johannesburg default
    zoom: 12,
    attributionControl: false
});

// Adjust map padding so content isn't hidden behind panels
map.setPadding({ top: 160, bottom: 320, left: 16, right: 16 });

/* ── User Location Avatar Marker ── */
let userMarker = null;

function buildAvatarMarker() {
    const wrap = document.createElement('div');
    wrap.className = 'user-marker-wrap';

    const pulse = document.createElement('div');
    pulse.className = 'user-marker-pulse';

    const avatar = document.createElement('div');
    avatar.className = 'user-marker-avatar';

    // Try to load a placeholder avatar; fall back to initials
    const img = document.createElement('img');
    img.src = 'https://api.dicebear.com/7.x/thumbs/svg?seed=courier&backgroundColor=18181b&shapeColor=ffffff';
    img.onerror = () => {
        img.remove();
        const ini = document.createElement('span');
        ini.className = 'avatar-initials';
        ini.textContent = 'K';
        avatar.appendChild(ini);
    };
    avatar.appendChild(img);

    const caret = document.createElement('div');
    caret.className = 'user-marker-caret';

    wrap.appendChild(pulse);
    wrap.appendChild(avatar);
    wrap.appendChild(caret);

    return wrap;
}

function placeUserMarker(lng, lat) {
    if (userMarker) userMarker.remove();
    userMarker = new mapboxgl.Marker({ element: buildAvatarMarker(), anchor: 'bottom' })
        .setLngLat([lng, lat])
        .addTo(map);
}

// Get device location
map.on('load', () => {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            pos => {
                const { longitude, latitude } = pos.coords;
                map.flyTo({ center: [longitude, latitude], zoom: 13, duration: 1400 });
                placeUserMarker(longitude, latitude);
            },
            () => {
                // Permission denied — stay on Joburg default, still show avatar marker
                placeUserMarker(28.0473, -26.2041);
            }
        );
    } else {
        placeUserMarker(28.0473, -26.2041);
    }
});

/* ═══════════════════════════════════════════════════
   DESTINATION MARKERS & ROUTE
═══════════════════════════════════════════════════ */
let pickupMarker  = null;
let dropoffMarker = null;
let routeLayerAdded = false;

function buildDestMarker(type) {
    const el = document.createElement('div');
    el.className = `dest-marker ${type}`;
    el.innerHTML = type === 'pickup'
        ? '<i class="fa-solid fa-location-dot"></i>'
        : '<i class="fa-solid fa-flag-checkered"></i>';
    return el;
}

function placeDestMarker(type, lng, lat) {
    if (type === 'pickup') {
        if (pickupMarker) pickupMarker.remove();
        pickupMarker = new mapboxgl.Marker({ element: buildDestMarker('pickup'), anchor: 'bottom' })
            .setLngLat([lng, lat]).addTo(map);
    } else {
        if (dropoffMarker) dropoffMarker.remove();
        dropoffMarker = new mapboxgl.Marker({ element: buildDestMarker('dropoff'), anchor: 'bottom' })
            .setLngLat([lng, lat]).addTo(map);
    }
    if (pickupMarker && dropoffMarker) {
        drawRoute();
        fitBothMarkers();
    }
}

async function drawRoute() {
    const p = pickupMarker.getLngLat();
    const d = dropoffMarker.getLngLat();
    try {
        const res = await fetch(
            `https://api.mapbox.com/directions/v5/mapbox/driving/${p.lng},${p.lat};${d.lng},${d.lat}?geometries=geojson&access_token=${MAPBOX_TOKEN}`
        );
        const data = await res.json();
        if (!data.routes || !data.routes[0]) return;

        const route = data.routes[0];
        const distKm = (route.distance / 1000).toFixed(1);
        const mins   = Math.ceil(route.duration / 60);
        const timeStr = mins >= 60 ? `${Math.floor(mins/60)}h ${mins%60}m` : `${mins} min`;

        // Update route bar
        document.getElementById('route-dist').textContent  = distKm + ' km';
        document.getElementById('route-time').textContent  = timeStr;

        // Update price based on distance
        updateRoutePrice(parseFloat(distKm));

        document.getElementById('route-bar').classList.add('visible');

        // Draw line on map
        const geojson = { type: 'Feature', geometry: route.geometry };
        if (map.getSource('route')) {
            map.getSource('route').setData(geojson);
        } else {
            map.addSource('route', { type: 'geojson', data: geojson });
            map.addLayer({
                id: 'route',
                type: 'line',
                source: 'route',
                layout: { 'line-join': 'round', 'line-cap': 'round' },
                paint: { 'line-color': '#18181b', 'line-width': 4, 'line-opacity': 0.85 }
            });
            routeLayerAdded = true;
        }
        updateSubmitBtn();
    } catch(e) { console.error('Route error:', e); }
}

function fitBothMarkers() {
    const p = pickupMarker.getLngLat();
    const d = dropoffMarker.getLngLat();
    const bounds = new mapboxgl.LngLatBounds([p.lng, p.lat], [d.lng, d.lat]);
    map.fitBounds(bounds, { padding: { top:190, bottom:340, left:40, right:40 }, duration: 900 });
}

let routeDistKm = 0;
function updateRoutePrice(km) {
    routeDistKm = km;
    if (selectedPkg) {
        const total = Math.round(selectedPkg.base + km * 3.5);
        document.getElementById('route-price').textContent = `R${total}`;
    } else {
        document.getElementById('route-price').textContent = '—';
    }
}

/* ═══════════════════════════════════════════════════
   GEOCODING / SEARCH
═══════════════════════════════════════════════════ */
let debounceTimers = {};
let selectedCoords = { pickup: null, dropoff: null };

function setupSearch(type) {
    const input = document.getElementById(`input-${type}`);
    const sugg  = document.getElementById(`sugg-${type}`);
    const clear = document.getElementById(`clear-${type}`);

    input.addEventListener('input', () => {
        const q = input.value.trim();
        clear.classList.toggle('visible', q.length > 0);

        if (q.length < 2) { sugg.style.display = 'none'; return; }

        clearTimeout(debounceTimers[type]);
        debounceTimers[type] = setTimeout(() => fetchSuggestions(type, q), 300);
    });

    input.addEventListener('focus', () => {
        if (input.value.trim().length > 1) sugg.style.display = 'block';
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', e => {
        if (!input.contains(e.target) && !sugg.contains(e.target)) sugg.style.display = 'none';
    });
}

async function fetchSuggestions(type, query) {
    const sugg = document.getElementById(`sugg-${type}`);
    try {
        const res = await fetch(
            `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${MAPBOX_TOKEN}&autocomplete=true&limit=5&country=ZA`
        );
        const data = await res.json();
        renderSuggestions(type, data.features || []);
    } catch(e) { sugg.style.display = 'none'; }
}

function renderSuggestions(type, features) {
    const sugg = document.getElementById(`sugg-${type}`);
    if (!features.length) { sugg.style.display = 'none'; return; }

    sugg.innerHTML = features.map((f, i) => {
        const name = f.text || f.place_name.split(',')[0];
        const sub  = f.place_name.replace(name + ', ', '').slice(0, 48);
        return `<div class="suggestion-item" onclick="selectSuggestion('${type}', ${i})">
            <div class="sugg-icon"><i class="fa-solid fa-location-dot"></i></div>
            <div>
                <div class="sugg-text-main">${name}</div>
                <div class="sugg-text-sub">${sub}</div>
            </div>
        </div>`;
    }).join('');

    sugg._features = features;
    sugg.style.display = 'block';
}

window.selectSuggestion = function(type, idx) {
    const sugg = document.getElementById(`sugg-${type}`);
    const f    = sugg._features[idx];
    const [lng, lat] = f.center;
    const input = document.getElementById(`input-${type}`);
    input.value = f.place_name;
    document.getElementById(`clear-${type}`).classList.add('visible');
    sugg.style.display = 'none';
    selectedCoords[type] = [lng, lat];
    placeDestMarker(type, lng, lat);
    updateSubmitBtn();
};

window.clearInput = function(type) {
    document.getElementById(`input-${type}`).value = '';
    document.getElementById(`clear-${type}`).classList.remove('visible');
    document.getElementById(`sugg-${type}`).style.display = 'none';
    selectedCoords[type] = null;

    if (type === 'pickup' && pickupMarker)  { pickupMarker.remove();  pickupMarker  = null; }
    if (type === 'dropoff' && dropoffMarker){ dropoffMarker.remove(); dropoffMarker = null; }

    if (map.getSource('route')) map.getSource('route').setData({ type:'Feature', geometry:{ type:'LineString', coordinates:[] }});
    document.getElementById('route-bar').classList.remove('visible');
    updateSubmitBtn();
};

/* ═══════════════════════════════════════════════════
   PACKAGE SELECTION
═══════════════════════════════════════════════════ */
let selectedPkg = null;

window.selectPackage = function(el, name, base) {
    document.querySelectorAll('.pkg-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    selectedPkg = { name, base };
    updateRoutePrice(routeDistKm);
    updateSubmitBtn();
};

function updateSubmitBtn() {
    const btn   = document.getElementById('submitBtn');
    const label = document.getElementById('submitLabel');
    const hasPickup  = !!selectedCoords.pickup;
    const hasDropoff = !!selectedCoords.dropoff;
    const hasPkg     = !!selectedPkg;

    if (!hasPickup || !hasDropoff) {
        btn.className = ''; label.textContent = 'Set pickup & destination';
        btn.disabled = true; return;
    }
    if (!hasPkg) {
        btn.className = ''; label.textContent = 'Select a package size';
        btn.disabled = true; return;
    }
    const total = Math.round(selectedPkg.base + routeDistKm * 3.5);
    btn.className = 'ready';
    label.textContent = `Book ${selectedPkg.name} · R${total}`;
    btn.disabled = false;
}

/* ═══════════════════════════════════════════════════
   TABS & SHEET
═══════════════════════════════════════════════════ */
let sheetCollapsed = false;
window.toggleSheet = function() {
    sheetCollapsed = !sheetCollapsed;
    document.getElementById('sheet').classList.toggle('collapsed', sheetCollapsed);
};

window.switchTab = function(tab) {
    const isSend = tab === 'send';
    document.getElementById('view-send').style.display  = isSend ? 'block' : 'none';
    document.getElementById('view-track').style.display = isSend ? 'none'  : 'block';
    document.getElementById('tab-send').classList.toggle('active',  isSend);
    document.getElementById('tab-track').classList.toggle('active', !isSend);
};

/* ═══════════════════════════════════════════════════
   BOOKING
═══════════════════════════════════════════════════ */
window.confirmBooking = async function() {
    if (!selectedPkg || !selectedCoords.pickup || !selectedCoords.dropoff) return;

    const btn   = document.getElementById('submitBtn');
    const label = document.getElementById('submitLabel');
    const orig  = label.textContent;
    label.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing…';
    btn.disabled = true;

    try {
        const user    = await ensureAuth();
        const orderId = "CG-" + Math.floor(1000 + Math.random() * 9000);
        const total   = Math.round(selectedPkg.base + routeDistKm * 3.5);

        const pickup  = document.getElementById('input-pickup').value;
        const dropoff = document.getElementById('input-dropoff').value;

        const payload = {
            orderNumber: orderId,
            userId: user.uid,
            customerName: "Katlego (App User)",
            customerAddress: dropoff,
            customerPhoneNumber: "+27601234567",
            restaurantName: "CourierGo Dispatch",
            restaurantAddress: pickup,
            orderItem: [{ name: selectedPkg.name, unitPrice: total, quantity: 1 }],
            totalOrderCost: total,
            distanceKm: routeDistKm,
            pickupCoords: selectedCoords.pickup,
            dropoffCoords: selectedCoords.dropoff,
            timestamp: Date.now()
        };

        // Save to Firebase
        await set(push(ref(database, 'orders')), payload);

        // Shipday
        const sdRes = await fetch("https://api.shipday.com/orders", {
            method: "POST",
            headers: { "Authorization": `Basic ${SHIPDAY_API_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        if (!sdRes.ok) throw new Error("Shipday:" + sdRes.status);

        showToast('success', `Order ${orderId} booked!`, `${selectedPkg.name} from ${pickup.split(',')[0]} → ${dropoff.split(',')[0]}`);

    } catch(e) {
        console.error(e);
        if (e.message.startsWith('Authentication')) {
            showToast('error', 'Sign-in failed', 'Could not authenticate. Please try again.');
        } else if (e.message.startsWith('Shipday')) {
            showToast('info', 'Order saved', 'Dispatch sync pending — our team will follow up.');
        } else {
            showToast('error', 'Booking failed', e.message || 'Something went wrong.');
        }
    } finally {
        label.textContent = orig;
        btn.disabled = false;
        btn.className = 'ready';
    }
};

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
window.addEventListener('load', () => {
    setTimeout(() => {
        const s = document.getElementById('splash');
        s.classList.add('hide');
        setTimeout(() => s.remove(), 650);
    }, 1400);

    setupSearch('pickup');
    setupSearch('dropoff');
    updateSubmitBtn();
});
</script>
