<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Courier Go</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .map-bg { background: #e4e4e7; height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        #splash { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .sheet { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: white; border-radius: 24px 24px 0 0; padding: 24px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 40; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .package-card.active { border-color: #000000; background-color: #f4f4f5; }
        .package-card.active .icon-box { background-color: #000000; color: #ffffff; }

        /* ── Custom Toast ── */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            width: calc(100% - 32px);
            max-width: 388px;
        }
        .toast {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: auto;
            backdrop-filter: blur(12px);
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.hide { opacity: 0; transform: translateY(-10px); }
        .toast-success { background: rgba(255,255,255,0.96); border: 1.5px solid #d1fae5; color: #065f46; }
        .toast-error   { background: rgba(255,255,255,0.96); border: 1.5px solid #fee2e2; color: #991b1b; }
        .toast-info    { background: rgba(255,255,255,0.96); border: 1.5px solid #e0e7ff; color: #3730a3; }
        .toast-icon { font-size: 15px; margin-top: 1px; flex-shrink: 0; }
        .toast-body { display: flex; flex-direction: column; gap: 2px; }
        .toast-title { font-size: 13px; font-weight: 700; }
        .toast-msg { font-size: 12px; font-weight: 500; opacity: 0.8; }
    </style>
</head>
<body>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Splash Screen -->
    <div id="splash">
        <i class="fa-solid fa-truck-fast text-white text-7xl mb-4"></i>
        <h1 class="text-white text-3xl font-bold tracking-tight">CourierGo</h1>
    </div>

    <!-- Floating Pill Header / Search Bar -->
    <div class="absolute top-4 left-0 right-0 z-50 px-4 flex justify-center pointer-events-none">
        <div class="bg-white/90 backdrop-blur-md w-full max-w-[388px] flex items-center shadow-lg rounded-full px-4 py-3 border border-zinc-200/80 pointer-events-auto">
            <i class="fa-solid fa-magnifying-glass text-zinc-400 mr-3"></i>
            <input type="text" placeholder="Where to send your package?" class="bg-transparent w-full focus:outline-none text-zinc-800 placeholder-zinc-400 text-sm">
            <div class="w-[1px] h-5 bg-zinc-200 mx-2"></div>
            <i class="fa-solid fa-sliders text-zinc-600 ml-1 cursor-pointer hover:text-black transition"></i>
        </div>
    </div>

    <!-- Map Background View -->
    <div class="map-bg">
        <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?w=800&q=80" class="w-full h-full object-cover grayscale opacity-60">
        <i class="fa-solid fa-location-dot text-black text-4xl absolute mb-12"></i>
    </div>

    <!-- Bottom Sheet -->
    <div class="sheet">
        <div class="w-12 h-1 bg-zinc-300 rounded-full mx-auto mb-4"></div>

        <!-- Segmented Tab Switcher -->
        <div class="bg-zinc-100 p-1 rounded-xl flex gap-1 mb-5">
            <button id="tab-btn-send" onclick="switchTab('send')" class="flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm text-zinc-900 transition-all">
                Send Package
            </button>
            <button id="tab-btn-track" onclick="switchTab('track')" class="flex-1 py-2 text-xs font-bold rounded-lg text-zinc-400 hover:text-zinc-700 transition-all">
                Activity & Tracking
            </button>
        </div>

        <!-- VIEW 1: SEND PACKAGE -->
        <div id="view-send" class="block">
            <div class="flex justify-between items-baseline mb-3">
                <h2 class="text-base font-bold text-zinc-800">Select package size</h2>
                <span class="text-[11px] text-zinc-400">Swipe for more &rarr;</span>
            </div>

            <div class="flex gap-3 overflow-x-auto -mx-6 px-6 pb-4 pt-1 no-scrollbar items-stretch">
                <!-- Document -->
                <div onclick="selectPackage(this, 'Document', 40.00)" class="package-card flex-shrink-0 w-36 p-3.5 border-2 border-zinc-100 rounded-2xl cursor-pointer hover:border-zinc-300 transition-all flex flex-col justify-between text-left">
                    <div>
                        <div class="icon-box w-10 h-10 bg-zinc-100 rounded-xl flex items-center justify-center text-base text-zinc-700 mb-2.5 transition-colors">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <h3 class="font-bold text-sm text-zinc-800 leading-tight">Document</h3>
                        <p class="text-[11px] font-semibold text-zinc-600 mt-1">Up to 1 kg</p>
                    </div>
                    <div class="mt-4 pt-2 border-t border-zinc-100 flex items-baseline justify-between">
                        <span class="text-[10px] text-zinc-400">Est.</span>
                        <span class="font-bold text-sm text-zinc-950">R 40.00</span>
                    </div>
                </div>

                <!-- Small Parcel -->
                <div onclick="selectPackage(this, 'Small Parcel', 65.00)" class="package-card flex-shrink-0 w-36 p-3.5 border-2 border-zinc-100 rounded-2xl cursor-pointer hover:border-zinc-300 transition-all flex flex-col justify-between text-left">
                    <div>
                        <div class="icon-box w-10 h-10 bg-zinc-100 rounded-xl flex items-center justify-center text-base text-zinc-700 mb-2.5 transition-colors">
                            <i class="fa-solid fa-box-open"></i>
                        </div>
                        <h3 class="font-bold text-sm text-zinc-800 leading-tight">Small Parcel</h3>
                        <p class="text-[11px] font-semibold text-zinc-600 mt-1">Up to 5 kg</p>
                    </div>
                    <div class="mt-4 pt-2 border-t border-zinc-100 flex items-baseline justify-between">
                        <span class="text-[10px] text-zinc-400">Est.</span>
                        <span class="font-bold text-sm text-zinc-950">R 65.00</span>
                    </div>
                </div>
            </div>

            <button id="submitBtn" onclick="confirmBooking()" class="w-full bg-zinc-300 text-zinc-500 p-3.5 rounded-xl font-bold text-sm transition-all cursor-not-allowed flex justify-center items-center gap-2" disabled>
                <span>Select a Package Size</span>
            </button>
        </div>

        <!-- VIEW 2: TRACKING & HISTORY -->
        <div id="view-track" class="hidden space-y-4">
            <div class="text-center text-zinc-500 text-sm py-8">
                Your tracking history will appear here once an order is placed.
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQSPwpVbGrdCuOoyitAeWQHIeipj2MgIY",
            authDomain: "newstart-64c43.firebaseapp.com",
            databaseURL: "https://newstart-64c43-default-rtdb.firebaseio.com",
            projectId: "newstart-64c43",
            storageBucket: "newstart-64c43.firebasestorage.app",
            messagingSenderId: "941619830061",
            appId: "1:941619830061:web:de9e0f791eb8f6eacf87a4",
            measurementId: "G-7064P2RFHN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // ── Toast System ──────────────────────────────────────────
        function showToast(type, title, message, duration = 4000) {
            const container = document.getElementById('toast-container');
            const icons = {
                success: 'fa-circle-check',
                error:   'fa-circle-xmark',
                info:    'fa-circle-info'
            };
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <i class="fa-solid ${icons[type]} toast-icon"></i>
                <div class="toast-body">
                    <div class="toast-title">${title}</div>
                    ${message ? `<div class="toast-msg">${message}</div>` : ''}
                </div>
            `;
            container.appendChild(toast);
            requestAnimationFrame(() => {
                requestAnimationFrame(() => toast.classList.add('show'));
            });
            setTimeout(() => {
                toast.classList.add('hide');
                toast.addEventListener('transitionend', () => toast.remove());
            }, duration);
        }

        // ── Auth: attempt silent sign-in on load, but don't block UI ──
        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                console.log("Auth ready:", user.uid);
            }
        });

        // Try signing in on load (best-effort; booking will retry if needed)
        signInAnonymously(auth).catch((err) => {
            console.warn("Silent auth failed on load:", err.message);
        });

        // ── Ensure the user is authenticated before proceeding ──
        async function ensureAuthenticated() {
            if (currentUser) return currentUser;

            showToast('info', 'Signing you in…', 'Authenticating your session.');
            try {
                const credential = await signInAnonymously(auth);
                currentUser = credential.user;
                return currentUser;
            } catch (err) {
                throw new Error("Authentication failed: " + err.message);
            }
        }

        // ── Splash ─────────────────────────────────────────────────
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }, 1200);
        };

        // ── Package Selection ──────────────────────────────────────
        let selectedPackageData = null;

        window.selectPackage = function(element, name, price) {
            document.querySelectorAll('.package-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            selectedPackageData = { name, price };

            const btn = document.getElementById('submitBtn');
            btn.removeAttribute('disabled');
            btn.className = "w-full bg-black text-white p-3.5 rounded-xl font-bold text-sm active:scale-[0.98] transition-all cursor-pointer shadow-md flex justify-center items-center gap-2";
            btn.innerHTML = `<span>Request ${name} &nbsp;·&nbsp; R ${price.toFixed(2)}</span>`;
        };

        // ── Tab Switcher ───────────────────────────────────────────
        window.switchTab = function(tab) {
            const sendView  = document.getElementById('view-send');
            const trackView = document.getElementById('view-track');
            const sendBtn   = document.getElementById('tab-btn-send');
            const trackBtn  = document.getElementById('tab-btn-track');
            const activeClass   = "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm text-zinc-900 transition-all";
            const inactiveClass = "flex-1 py-2 text-xs font-bold rounded-lg text-zinc-400 hover:text-zinc-700 transition-all";

            if (tab === 'send') {
                sendView.classList.remove('hidden');
                trackView.classList.add('hidden');
                sendBtn.className  = activeClass;
                trackBtn.className = inactiveClass;
            } else {
                sendView.classList.add('hidden');
                trackView.classList.remove('hidden');
                trackBtn.className = activeClass;
                sendBtn.className  = inactiveClass;
            }
        };

        // ── Booking ────────────────────────────────────────────────
        window.confirmBooking = async function() {
            if (!selectedPackageData) return;

            const btn = document.getElementById('submitBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i><span>Processing…</span>`;
            btn.disabled = true;

            try {
                // 1. Ensure user is authenticated before doing anything
                const user = await ensureAuthenticated();

                // 2. Build order payload
                const orderId = "CG-" + Math.floor(1000 + Math.random() * 9000);
                const orderPayload = {
                    orderNumber: orderId,
                    userId: user.uid,
                    customerName: "Katlego (App User)",
                    customerAddress: "Sandton, South Africa",
                    customerPhoneNumber: "+27601234567",
                    restaurantName: "CourierGo Dispatch",
                    restaurantAddress: "Rosebank, South Africa",
                    orderItem: [{
                        name: selectedPackageData.name,
                        unitPrice: selectedPackageData.price,
                        quantity: 1
                    }],
                    totalOrderCost: selectedPackageData.price,
                    timestamp: Date.now()
                };

                // 3. Save to Firebase Realtime Database
                const newOrderRef = push(ref(database, 'orders'));
                await set(newOrderRef, orderPayload);
                console.log("Saved to Firebase:", newOrderRef.key);

                // 4. Send to Shipday API
                /*
                 * NOTE: Direct fetch will face CORS issues in production.
                 * Replace the URL below with your proxy backend (e.g. '/api/shipday').
                 */
                const SHIPDAY_API_KEY = "K5a8wQJF3f.az2zfrhgzwxK9JONI2y8";

                const shipdayResponse = await fetch("https://api.shipday.com/orders", {
                    method: "POST",
                    headers: {
                        "Authorization": `Basic ${SHIPDAY_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(orderPayload)
                });

                if (!shipdayResponse.ok) {
                    throw new Error("Shipday responded with status " + shipdayResponse.status);
                }

                showToast('success', `Order ${orderId} confirmed!`, `Your ${selectedPackageData.name} has been dispatched.`);

            } catch (error) {
                console.error("Booking error:", error);

                if (error.message.startsWith("Authentication failed")) {
                    showToast('error', 'Sign-in failed', 'Could not authenticate your session. Please try again.');
                } else if (error.message.includes("Shipday")) {
                    // Firebase save succeeded but Shipday failed
                    showToast('info', 'Order saved', 'Dispatch system sync failed — our team will follow up shortly.');
                } else {
                    showToast('error', 'Booking failed', error.message || 'Something went wrong. Please try again.');
                }
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
