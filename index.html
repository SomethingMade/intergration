<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Poppins:wght@700&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .app-logo { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -1.5px; }
        
        .video-container { aspect-ratio: 9 / 16; max-height: 680px; }
        .feed-container { scrollbar-width: none; }
        .feed-container::-webkit-scrollbar { display: none; }
        
        .video-overlay {
            background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.4));
        }
        
        .dark .video-overlay {
            background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.6));
        }

        .tab-active { 
            color: #000; 
            font-weight: 600; 
            border-bottom: 3px solid #000; 
        }
        .dark .tab-active { 
            color: #fff; 
            border-bottom: 3px solid #fff; 
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-zinc-950 dark:text-white">

    <!-- Login Screen -->
    <div id="loginScreen" class="hidden fixed inset-0 bg-white dark:bg-zinc-950 flex items-center justify-center z-50">
        <div class="text-center px-6">
            <div class="flex items-center justify-center gap-x-2 mb-8">
                <i class="fa-solid fa-play text-4xl"></i>
                <span class="app-logo text-5xl font-bold">Echo</span>
            </div>
            <h1 class="text-2xl font-semibold mb-2">Welcome to Echo</h1>
            <p class="text-gray-500 dark:text-gray-400 mb-8">Short videos. Real moments.</p>
            
            <button onclick="signInWithGoogle()"
                    class="flex items-center justify-center gap-x-3 w-full max-w-xs mx-auto px-6 py-3 bg-white dark:bg-zinc-900 border dark:border-zinc-700 rounded-2xl hover:bg-gray-50 dark:hover:bg-zinc-800 transition-colors">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="">
                <span class="font-medium">Continue with Google</span>
            </button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <!-- Top Navigation -->
        <nav class="bg-white dark:bg-zinc-900 border-b dark:border-zinc-800 sticky top-0 z-50">
            <div class="max-w-[1200px] mx-auto px-4">
                <div class="h-14 flex items-center justify-between">
                    <div class="flex items-center gap-x-2">
                        <i class="fa-solid fa-play text-3xl"></i>
                        <span class="app-logo text-3xl font-bold tracking-tighter">Echo</span>
                    </div>

                    <!-- Search -->
                    <div class="hidden md:flex flex-1 max-w-md mx-8">
                        <div class="w-full bg-gray-100 dark:bg-zinc-800 rounded-full flex items-center px-4 py-2">
                            <i class="fa-solid fa-search text-gray-400 mr-3"></i>
                            <input type="text" class="bg-transparent flex-1 outline-none text-sm dark:text-white" placeholder="Search">
                        </div>
                    </div>

                    <div class="flex items-center gap-x-4">
                        <!-- Dark Mode Toggle -->
                        <button onclick="toggleDarkMode()" 
                                class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800">
                            <i class="fa-solid fa-moon text-lg" id="themeIcon"></i>
                        </button>

                        <button onclick="showUploadModal()" 
                                class="hidden md:flex items-center gap-x-2 px-5 py-2 rounded-full bg-black dark:bg-white dark:text-black text-white text-sm font-medium">
                            <i class="fa-solid fa-plus"></i>
                            <span>Upload</span>
                        </button>
                        
                        <img id="navAvatar" onclick="openProfile(currentUser)" 
                             class="w-8 h-8 rounded-full cursor-pointer ring-2 ring-white dark:ring-zinc-900 object-cover" alt="Profile">
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-[1200px] mx-auto flex">
            
            <!-- Sidebar -->
            <div class="hidden lg:flex w-56 flex-col border-r dark:border-zinc-800 bg-white dark:bg-zinc-900 min-h-[calc(100vh-56px)] p-3">
                <div class="space-y-1">
                    <div onclick="switchTab('foryou')" class="tab-item flex items-center gap-x-3 px-4 py-3 rounded-xl cursor-pointer hover:bg-gray-100 dark:hover:bg-zinc-800" data-tab="foryou">
                        <i class="fa-solid fa-home w-5"></i><span>For You</span>
                    </div>
                    <div onclick="switchTab('following')" class="tab-item flex items-center gap-x-3 px-4 py-3 rounded-xl cursor-pointer hover:bg-gray-100 dark:hover:bg-zinc-800" data-tab="following">
                        <i class="fa-solid fa-users w-5"></i><span>Following</span>
                    </div>
                    <div onclick="switchTab('discover')" class="tab-item flex items-center gap-x-3 px-4 py-3 rounded-xl cursor-pointer hover:bg-gray-100 dark:hover:bg-zinc-800" data-tab="discover">
                        <i class="fa-solid fa-compass w-5"></i><span>Discover</span>
                    </div>
                </div>
            </div>

            <!-- Feed -->
            <div class="flex-1 max-w-[480px] mx-auto lg:mx-0">
                
                <!-- Mobile Tabs -->
                <div class="flex border-b dark:border-zinc-800 bg-white dark:bg-zinc-900 lg:hidden">
                    <div onclick="switchTab('foryou')" class="tab flex-1 text-center py-3 cursor-pointer tab-active" data-tab="foryou">For You</div>
                    <div onclick="switchTab('following')" class="tab flex-1 text-center py-3 cursor-pointer text-gray-500 dark:text-gray-400" data-tab="following">Following</div>
                    <div onclick="switchTab('discover')" class="tab flex-1 text-center py-3 cursor-pointer text-gray-500 dark:text-gray-400" data-tab="discover">Discover</div>
                </div>

                <!-- Video Feeds -->
                <div id="foryou" class="feed feed-container h-[calc(100vh-112px)] lg:h-[calc(100vh-56px)] overflow-y-auto snap-y snap-mandatory"></div>
                <div id="following" class="feed feed-container h-[calc(100vh-112px)] lg:h-[calc(100vh-56px)] overflow-y-auto snap-y snap-mandatory hidden"></div>
                <div id="discover" class="feed feed-container h-[calc(100vh-112px)] lg:h-[calc(100vh-56px)] overflow-y-auto snap-y snap-mandatory hidden"></div>
            </div>
        </div>

        <!-- Mobile Bottom Nav -->
        <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-zinc-900 border-t dark:border-zinc-800 z-50">
            <div class="flex justify-around items-center h-14">
                <div onclick="switchTab('foryou')" class="flex flex-col items-center text-xs cursor-pointer"><i class="fa-solid fa-home text-xl"></i></div>
                <div onclick="switchTab('discover')" class="flex flex-col items-center text-xs text-gray-500 dark:text-gray-400 cursor-pointer"><i class="fa-solid fa-compass text-xl"></i></div>
                <div onclick="showUploadModal()" class="flex flex-col items-center -mt-5"><div class="bg-black dark:bg-white dark:text-black text-white w-12 h-12 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-plus text-xl"></i></div></div>
                <div onclick="switchTab('following')" class="flex flex-col items-center text-xs text-gray-500 dark:text-gray-400 cursor-pointer"><i class="fa-solid fa-users text-xl"></i></div>
                <div onclick="openProfile(currentUser)" class="flex flex-col items-center text-xs text-gray-500 dark:text-gray-400 cursor-pointer"><i class="fa-solid fa-user text-xl"></i></div>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" onclick="closeProfileModal()" class="hidden fixed inset-0 bg-black/50 z-[60] flex items-end lg:items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-zinc-900 w-full lg:w-[420px] lg:rounded-2xl lg:m-4 rounded-t-3xl">
            <div class="p-6">
                <div class="flex justify-between">
                    <div class="flex gap-4">
                        <img id="profileAvatar" class="w-16 h-16 rounded-full object-cover" alt="">
                        <div>
                            <div id="profileUsername" class="font-semibold text-xl"></div>
                            <div id="profileHandle" class="text-gray-500 dark:text-gray-400"></div>
                        </div>
                    </div>
                    <button onclick="closeProfileModal()" class="text-2xl">×</button>
                </div>

                <div class="flex gap-8 mt-5">
                    <div><div class="font-semibold" id="profileFollowers"></div><div class="text-sm text-gray-500">Followers</div></div>
                    <div><div class="font-semibold" id="profileFollowing"></div><div class="text-sm text-gray-500">Following</div></div>
                    <div><div class="font-semibold" id="profileLikes"></div><div class="text-sm text-gray-500">Likes</div></div>
                </div>

                <button onclick="signOut()" 
                        class="mt-6 w-full py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-full font-medium text-sm">
                    Sign Out
                </button>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" onclick="hideUploadModal()" class="hidden fixed inset-0 bg-black/40 z-50 flex items-end lg:items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-zinc-900 w-full lg:w-[400px] lg:rounded-2xl rounded-t-3xl p-6">
            <div class="flex justify-between mb-6">
                <h3 class="font-semibold text-xl">Create post</h3>
                <button onclick="hideUploadModal()" class="text-2xl">×</button>
            </div>
            <p class="text-sm text-gray-500 dark:text-gray-400">Uploading videos will be added in the next update.</p>
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBQSPwpVbGrdCuOoyitAeWQHIeipj2MgIY",
            authDomain: "newstart-64c43.firebaseapp.com",
            databaseURL: "https://newstart-64c43-default-rtdb.firebaseio.com",
            projectId: "newstart-64c43",
            storageBucket: "newstart-64c43.firebasestorage.app",
            messagingSenderId: "941619830061",
            appId: "1:941619830061:web:de9e0f791eb8f6eacf87a4",
            measurementId: "G-7064P2RFHN"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUser = null;
        let lastLoadedKey = null;
        let isLoading = false;

        // ==================== DARK MODE ====================
        function initDarkMode() {
            const isDark = localStorage.getItem('darkMode') === 'true' || 
                          (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            
            if (isDark) {
                document.documentElement.classList.add('dark');
            }
            updateThemeIcon();
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('darkMode', isDark);
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            const isDark = document.documentElement.classList.contains('dark');
            icon.className = isDark ? 'fa-solid fa-sun text-lg' : 'fa-solid fa-moon text-lg';
        }

        // ==================== AUTHENTICATION ====================
        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    // User signed in
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                })
                .catch((error) => {
                    alert("Sign in failed: " + error.message);
                });
        }

        function signOut() {
            auth.signOut().then(() => {
                document.getElementById('mainApp').classList.add('hidden');
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('profileModal').classList.add('hidden');
            });
        }

        // ==================== INFINITE SCROLL ====================
        function setupInfiniteScroll(tab) {
            const container = document.getElementById(tab);
            
            container.addEventListener('scroll', () => {
                if (isLoading) return;
                
                const { scrollTop, scrollHeight, clientHeight } = container;
                
                if (scrollTop + clientHeight >= scrollHeight - 200) {
                    loadMoreVideos(tab);
                }
            });
        }

        function loadMoreVideos(tab) {
            if (isLoading) return;
            isLoading = true;

            const container = document.getElementById(tab);
            const videosRef = database.ref('videos');

            let query = videosRef.orderByKey().limitToLast(5);
            
            if (lastLoadedKey) {
                query = videosRef.orderByKey().endBefore(lastLoadedKey).limitToLast(5);
            }

            query.once('value')
                .then(snapshot => {
                    if (!snapshot.exists()) {
                        isLoading = false;
                        return;
                    }

                    const videos = [];
                    snapshot.forEach(child => {
                        videos.unshift({ id: child.key, ...child.val() });
                    });

                    if (videos.length > 0) {
                        lastLoadedKey = videos[0].id;
                        renderVideoCards(videos, container);
                    }
                    isLoading = false;
                })
                .catch(err => {
                    console.error(err);
                    isLoading = false;
                });
        }

        // ==================== RENDER VIDEOS ====================
        function renderVideoCards(videos, container) {
            videos.forEach(video => {
                const videoHTML = `
                    <div class="video-card flex justify-center py-2 lg:py-4">
                        <div class="w-full max-w-[480px] px-2">
                            <div class="relative bg-black rounded-3xl overflow-hidden shadow-sm video-container mx-auto">
                                <div class="w-full h-full bg-gradient-to-br ${video.bgColor || 'from-zinc-700 to-zinc-900'} flex items-center justify-center relative">
                                    <div class="text-center">
                                        <i class="fa-solid fa-play text-6xl text-white/60 mb-2"></i>
                                        <p class="text-white/60 text-sm">Video</p>
                                    </div>
                                    
                                    <div class="absolute bottom-0 left-0 right-0 p-4 video-overlay text-white">
                                        <div>
                                            <div class="flex items-center gap-x-2">
                                                <span onclick="openProfileByUsername('${video.username}', '${video.avatar}', event)" 
                                                      class="font-semibold cursor-pointer hover:underline">${video.username}</span>
                                            </div>
                                            <p class="text-sm mt-1 line-clamp-2">${video.description || ''}</p>
                                            <div class="flex items-center gap-x-1.5 mt-2 text-xs">
                                                <i class="fa-solid fa-music"></i>
                                                <span>${video.sound || 'Original sound'}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="absolute right-3 bottom-20 flex flex-col items-center gap-y-5 text-white">
                                        <div onclick="openProfileByUsername('${video.username}', '${video.avatar}', event)" 
                                             class="cursor-pointer">
                                            <div class="relative">
                                                <img src="${video.avatar || 'https://i.pravatar.cc/40'}" 
                                                     class="w-10 h-10 rounded-full border-2 border-white object-cover" alt="">
                                            </div>
                                        </div>

                                        <div onclick="likeVideo(this, '${video.id}')" class="flex flex-col items-center cursor-pointer">
                                            <i class="fa-solid fa-heart text-3xl"></i>
                                            <span class="text-xs font-medium mt-0.5" id="likes-${video.id}">${formatLikes(video.likes || 0)}</span>
                                        </div>

                                        <div onclick="showComments('${video.id}')" class="flex flex-col items-center cursor-pointer">
                                            <i class="fa-solid fa-comment-dots text-3xl"></i>
                                            <span class="text-xs font-medium mt-0.5">${video.commentsCount || 0}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += videoHTML;
            });
        }

        function formatLikes(likes) {
            if (likes >= 1000000) return (likes / 1000000).toFixed(1) + 'M';
            if (likes >= 1000) return (likes / 1000).toFixed(1) + 'K';
            return likes;
        }

        // ==================== LIKE FUNCTIONALITY ====================
        function likeVideo(element, videoId) {
            const likesRef = database.ref(`videos/${videoId}/likes`);
            const countEl = element.querySelector('span');

            likesRef.transaction(currentLikes => {
                return (currentLikes || 0) + 1;
            }).then(result => {
                if (result.committed) {
                    countEl.textContent = formatLikes(result.snapshot.val());
                }
            });
        }

        // ==================== LOAD INITIAL VIDEOS ====================
        function loadInitialVideos(tab) {
            const container = document.getElementById(tab);
            container.innerHTML = '';
            lastLoadedKey = null;
            isLoading = false;

            const videosRef = database.ref('videos').orderByKey().limitToLast(5);

            videosRef.once('value').then(snapshot => {
                if (!snapshot.exists()) {
                    container.innerHTML = `<div class="p-8 text-center text-gray-400">No videos yet. Add some in Firebase.</div>`;
                    return;
                }

                const videos = [];
                snapshot.forEach(child => {
                    videos.unshift({ id: child.key, ...child.val() });
                });

                if (videos.length > 0) {
                    lastLoadedKey = videos[0].id;
                    renderVideoCards(videos, container);
                }
            });
        }

        // ==================== TAB SWITCHING ====================
        function switchTab(tab) {
            document.querySelectorAll('.feed').forEach(feed => feed.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');

            // Update mobile tabs
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('tab-active', 'text-black', 'dark:text-white');
                t.classList.add('text-gray-500', 'dark:text-gray-400');
                if (t.getAttribute('data-tab') === tab) {
                    t.classList.add('tab-active', 'text-black', 'dark:text-white');
                    t.classList.remove('text-gray-500', 'dark:text-gray-400');
                }
            });

            // Update sidebar
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('bg-gray-100', 'dark:bg-zinc-800');
                if (item.getAttribute('data-tab') === tab) {
                    item.classList.add('bg-gray-100', 'dark:bg-zinc-800');
                }
            });

            // Load videos if feed is empty
            const feed = document.getElementById(tab);
            if (feed.innerHTML.trim() === '') {
                loadInitialVideos(tab);
            }
        }

        // ==================== PROFILE ====================
        let currentProfileUser = null;

        function openProfileByUsername(username, avatar, event) {
            if (event) event.stopImmediatePropagation();
            
            const profileData = {
                username: username,
                avatar: avatar || 'https://i.pravatar.cc/100',
                uid: null
            };
            openProfile(profileData);
        }

        function openProfile(userData) {
            if (!userData) return;
            
            currentProfileUser = userData;
            const modal = document.getElementById('profileModal');

            document.getElementById('profileAvatar').src = userData.avatar || 'https://i.pravatar.cc/100';
            document.getElementById('profileUsername').textContent = userData.username || 'User';
            document.getElementById('profileHandle').textContent = '@' + (userData.username || 'user');

            // Fake stats (can be improved later)
            document.getElementById('profileFollowers').textContent = '124.8K';
            document.getElementById('profileFollowing').textContent = '342';
            document.getElementById('profileLikes').textContent = '2.4M';

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeProfileModal() {
            const modal = document.getElementById('profileModal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        // ==================== OTHER FUNCTIONS ====================
        function showUploadModal() {
            document.getElementById('uploadModal').classList.remove('hidden');
            document.getElementById('uploadModal').classList.add('flex');
        }

        function hideUploadModal() {
            const modal = document.getElementById('uploadModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function showComments(videoId) {
            alert("Comments feature coming soon. Video ID: " + videoId);
        }

        // ==================== INITIALIZATION ====================
        function initApp() {
            initDarkMode();

            // Auth state listener
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = {
                        uid: user.uid,
                        username: user.displayName || user.email.split('@')[0],
                        avatar: user.photoURL || 'https://i.pravatar.cc/32'
                    };

                    // Show main app
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');

                    // Set navbar avatar
                    document.getElementById('navAvatar').src = currentUser.avatar;

                    // Load initial feed
                    loadInitialVideos('foryou');
                    setupInfiniteScroll('foryou');

                    // Set default sidebar active
                    const defaultTab = document.querySelector('.tab-item[data-tab="foryou"]');
                    if (defaultTab) defaultTab.classList.add('bg-gray-100', 'dark:bg-zinc-800');

                } else {
                    // Show login screen
                    document.getElementById('mainApp').classList.add('hidden');
                    document.getElementById('loginScreen').classList.remove('hidden');
                }
            });

            // Setup infinite scroll for other tabs
            setupInfiniteScroll('following');
            setupInfiniteScroll('discover');
        }

        window.onload = initApp;
    </script>
</body>
</html>
