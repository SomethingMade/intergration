<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mmila (Morabaraba)</title>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #f5f5f7;
            --line: #333;
        }
        body {
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .board-container {
            position: relative;
            width: 400px;
            height: 400px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(7, 1fr);
            padding: 20px;
        }
        /* Drawing the lines for the board */
        .board-container::before {
            content: '';
            position: absolute;
            top: 20px; left: 20px; right: 20px; bottom: 20px;
            border: 2px solid var(--line);
            pointer-events: none;
        }
        .point {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e1e1e1;
            margin: auto;
            cursor: pointer;
            z-index: 1;
            transition: transform 0.2s;
        }
        .point:hover { transform: scale(1.1); }
        .point.p1 { background: #007AFF; }
        .point.p2 { background: #FF3B30; }
        
        h1 { font-weight: 300; color: #1d1d1f; }
    </style>
</head>
<body>

    <h1>Mmila</h1>
    <div class="board-container" id="board">
        </div>

    <script>
        const board = document.getElementById('board');
        let turn = 1;

        // Create 24 points
        for (let i = 0; i < 24; i++) {
            const point = document.createElement('div');
            point.classList.add('point');
            point.addEventListener('click', () => {
                if (!point.classList.contains('p1') && !point.classList.contains('p2')) {
                    point.classList.add(turn === 1 ? 'p1' : 'p2');
                    turn = turn === 1 ? 2 : 1;
                }
            });
            board.appendChild(point);
        }
    </script>
</body>
</html>
