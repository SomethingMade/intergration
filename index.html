<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Courier Go</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .map-bg { background: #e4e4e7; height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        #splash { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .sheet { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: white; border-radius: 24px 24px 0 0; padding: 24px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 40; }
        
        /* Hide ugly system scrollbars but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Selected Card theme override */
        .package-card.active { border-color: #000000; background-color: #f4f4f5; }
        .package-card.active .icon-box { background-color: #000000; color: #ffffff; }
    </style>
</head>
<body>

    <div id="splash">
        <i class="fa-solid fa-truck-fast text-white text-7xl mb-4"></i>
        <h1 class="text-white text-3xl font-bold tracking-tight">CourierGo</h1>
    </div>

    <div class="absolute top-4 left-0 right-0 z-50 px-4 flex justify-center pointer-events-none">
        <div class="bg-white/90 backdrop-blur-md w-full max-w-[388px] flex items-center shadow-lg rounded-full px-4 py-3 border border-zinc-200/80 pointer-events-auto">
            <i class="fa-solid fa-magnifying-glass text-zinc-400 mr-3"></i>
            <input type="text" placeholder="Where to send your package?" class="bg-transparent w-full focus:outline-none text-zinc-800 placeholder-zinc-400 text-sm">
            <div class="w-[1px] h-5 bg-zinc-200 mx-2"></div>
            <i class="fa-solid fa-sliders text-zinc-600 ml-1 cursor-pointer hover:text-black transition"></i>
        </div>
    </div>

    <div class="map-bg">
        <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?w=800&q=80" class="w-full h-full object-cover grayscale opacity-60">
        <i class="fa-solid fa-location-dot text-black text-4xl absolute mb-12"></i>
    </div>

    <div class="sheet">
        <div class="w-12 h-1 bg-zinc-300 rounded-full mx-auto mb-4"></div>
        <div class="flex justify-between items-baseline mb-3">
            <h2 class="text-base font-bold text-zinc-800">Select package size</h2>
            <span class="text-[11px] text-zinc-400">Swipe for more &rarr;</span>
        </div>
        
        <div class="flex gap-3 overflow-x-auto -mx-6 px-6 pb-4 pt-1 no-scrollbar items-stretch">
            
            <div onclick="selectPackage(this, 'Document', 'R 40.00')" class="package-card flex-shrink-0 w-36 p-3.5 border-2 border-zinc-100 rounded-2xl cursor-pointer hover:border-zinc-300 transition-all flex flex-col justify-between text-left">
                <div>
                    <div class="icon-box w-10 h-10 bg-zinc-100 rounded-xl flex items-center justify-center text-base text-zinc-700 mb-2.5 transition-colors">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <h3 class="font-bold text-sm text-zinc-800 leading-tight">Document</h3>
                    <p class="text-[11px] font-semibold text-zinc-600 mt-1">Up to 1 kg</p>
                    <p class="text-[10px] text-zinc-400">Max A4 size</p>
                </div>
                <div class="mt-4 pt-2 border-t border-zinc-100 flex items-baseline justify-between">
                    <span class="text-[10px] text-zinc-400">Est.</span>
                    <span class="font-bold text-sm text-zinc-950">R 40.00</span>
                </div>
            </div>

            <div onclick="selectPackage(this, 'Small Parcel', 'R 65.00')" class="package-card flex-shrink-0 w-36 p-3.5 border-2 border-zinc-100 rounded-2xl cursor-pointer hover:border-zinc-300 transition-all flex flex-col justify-between text-left">
                <div>
                    <div class="icon-box w-10 h-10 bg-zinc-100 rounded-xl flex items-center justify-center text-base text-zinc-700 mb-2.5 transition-colors">
                        <i class="fa-solid fa-box-open"></i>
                    </div>
                    <h3 class="font-bold text-sm text-zinc-800 leading-tight">Small Parcel</h3>
                    <p class="text-[11px] font-semibold text-zinc-600 mt-1">Up to 5 kg</p>
                    <p class="text-[10px] text-zinc-400">20×20×20 cm</p>
                </div>
                <div class="mt-4 pt-2 border-t border-zinc-100 flex items-baseline justify-between">
                    <span class="text-[10px] text-zinc-400">Est.</span>
                    <span class="font-bold text-sm text-zinc-950">R 65.00</span>
                </div>
            </div>

            <div onclick="selectPackage(this, 'Medium Box', 'R 110.00')" class="package-card flex-shrink-0 w-36 p-3.5 border-2 border-zinc-100 rounded-2xl cursor-pointer hover:border-zinc-300 transition-all flex flex-col justify-between text-left">
                <div>
                    <div class="icon-box w-10 h-10 bg-zinc-100 rounded-xl flex items-center justify-center text-base text-zinc-700 mb-2.5 transition-colors">
                        <i class="fa-solid fa-box"></i>
                    </div>
                    <h3 class="font-bold text-sm text-zinc-800 leading-tight">Medium Box</h3>
                    <p class="text-[11px] font-semibold text-zinc-600 mt-1">Up to 15 kg</p>
                    <p class="text-[10px] text-zinc-400">40×40×40 cm</p>
                </div>
                <div class="mt-4 pt-2 border-t border-zinc-100 flex items-baseline justify-between">
                    <span class="text-[10px] text-zinc-400">Est.</span>
                    <span class="font-bold text-sm text-zinc-950">R 110.00</span>
                </div>
            </div>

            <div onclick="selectPackage(this, 'Large Cargo', 'R 220.00')" class="package-card flex-shrink-0 w-36 p-3.5 border-2 border-zinc-100 rounded-2xl cursor-pointer hover:border-zinc-300 transition-all flex flex-col justify-between text-left">
                <div>
                    <div class="icon-box w-10 h-10 bg-zinc-100 rounded-xl flex items-center justify-center text-base text-zinc-700 mb-2.5 transition-colors">
                        <i class="fa-solid fa-boxes-stacked"></i>
                    </div>
                    <h3 class="font-bold text-sm text-zinc-800 leading-tight">Large Cargo</h3>
                    <p class="text-[11px] font-semibold text-zinc-600 mt-1">Up to 30 kg</p>
                    <p class="text-[10px] text-zinc-400">80×60×60 cm</p>
                </div>
                <div class="mt-4 pt-2 border-t border-zinc-100 flex items-baseline justify-between">
                    <span class="text-[10px] text-zinc-400">Est.</span>
                    <span class="font-bold text-sm text-zinc-950">R 220.00</span>
                </div>
            </div>

        </div>

        <button id="submitBtn" onclick="confirmBooking()" class="w-full bg-zinc-300 text-zinc-500 p-3.5 rounded-xl font-bold text-sm transition-all cursor-not-allowed" disabled>
            Select a Package Size
        </button>
    </div>

    <script>
        let selectedPackageData = null;

        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 500);
            }, 1200);
        };

        function selectPackage(element, name, price) {
            document.querySelectorAll('.package-card').forEach(card => card.classList.remove('active'));
            
            element.classList.add('active');
            selectedPackageData = { name, price };

            const btn = document.getElementById('submitBtn');
            btn.removeAttribute('disabled');
            btn.className = "w-full bg-black text-white p-3.5 rounded-xl font-bold text-sm active:scale-[0.98] transition-all cursor-pointer shadow-md";
            btn.innerText = `Confirm ${name} (${price})`;
        }

        function confirmBooking() {
            if (selectedPackageData) {
                alert(`Size confirmed: Delivery request generated for a ${selectedPackageData.name} tier.`);
            }
        }
    </script>
</body>
</html>
