<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .app-logo { font-family: 'Poppins', sans-serif; font-weight: 700; letter-spacing: -1.5px; }
        
        .video-container { 
            aspect-ratio: 9 / 16; 
            width: 100%;
            max-height: 85vh;
            background: #000; 
        }
        
        @media (min-width: 1024px) {
            .video-container { max-width: 480px; margin: 0 auto; }
        }
        
        .feed-container { scrollbar-width: none; }
        .feed-container::-webkit-scrollbar { display: none; }
        
        .video-overlay { background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.55)); }
        
        .tab-active { color: #000; font-weight: 600; border-bottom: 3px solid #000; }
        .dark .tab-active { color: #fff; border-bottom: 3px solid #fff; }
        
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            width: 18px; height: 18px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        .spinner-dark {
            border-top-color: #000;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .liked-heart { color: #ff2d55; }

        .reply-input-area { display: none; }
        .reply-input-area.open { display: flex; }

        .replies-list { display: none; }
        .replies-list.open { display: block; }

        /* Smooth slide up for modals */
        .modal-sheet {
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-zinc-950 dark:text-white transition-colors duration-200">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 bg-white dark:bg-zinc-950 flex items-center justify-center z-50 transition-colors duration-200">
        <div class="text-center px-6">
            <div class="flex items-center justify-center gap-x-2 mb-8">
                <i class="fa-solid fa-play text-4xl"></i>
                <span class="app-logo text-5xl font-bold">Echo</span>
            </div>
            <h1 class="text-2xl font-semibold mb-2">Welcome to Echo</h1>
            <p class="text-gray-500 dark:text-gray-400 mb-8">Short videos. Real moments.</p>
            
            <button onclick="signInWithGoogle()" 
                    class="flex items-center justify-center gap-x-3 w-full max-w-xs mx-auto px-6 py-3 bg-white dark:bg-zinc-900 border dark:border-zinc-700 rounded-2xl hover:bg-gray-50 dark:hover:bg-zinc-800 transition-colors">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="">
                <span class="font-medium">Continue with Google</span>
            </button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <!-- Top Navigation -->
        <nav class="bg-white dark:bg-zinc-900 border-b dark:border-zinc-800 sticky top-0 z-50 transition-colors duration-200">
            <div class="max-w-[1200px] mx-auto px-4">
                <div class="h-14 flex items-center justify-between">
                    <div class="flex items-center gap-x-2">
                        <i class="fa-solid fa-play text-3xl"></i>
                        <span class="app-logo text-3xl font-bold">Echo</span>
                    </div>

                    <div class="hidden md:flex flex-1 max-w-md mx-8">
                        <div class="w-full bg-gray-100 dark:bg-zinc-800 rounded-full flex items-center px-4 py-2 transition-colors">
                            <i class="fa-solid fa-search text-gray-400 mr-3"></i>
                            <input type="text" class="bg-transparent flex-1 outline-none text-sm dark:text-white" placeholder="Search">
                        </div>
                    </div>

                    <div class="flex items-center gap-x-4">
                        <button onclick="toggleDarkMode()" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors">
                            <i class="fa-solid fa-moon text-lg" id="themeIcon"></i>
                        </button>

                        <button onclick="showUploadModal()" class="hidden md:flex items-center gap-x-2 px-5 py-2 rounded-full bg-black dark:bg-white dark:text-black text-white text-sm font-medium transition-colors">
                            <i class="fa-solid fa-plus"></i>
                            <span>Upload</span>
                        </button>
                        
                        <img id="navAvatar" onclick="openProfile(currentUser)" class="w-8 h-8 rounded-full cursor-pointer object-cover ring-2 ring-white dark:ring-zinc-900" alt="Profile">
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-[1200px] mx-auto flex">
            <!-- Sidebar -->
            <div class="hidden lg:flex w-56 flex-col border-r dark:border-zinc-800 bg-white dark:bg-zinc-900 min-h-[calc(100vh-56px)] p-3 transition-colors duration-200">
                <div class="space-y-1">
                    <div onclick="switchTab('foryou')" class="tab-item flex items-center gap-x-3 px-4 py-3 rounded-xl cursor-pointer hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors" data-tab="foryou">
                        <i class="fa-solid fa-home w-5"></i><span>For You</span>
                    </div>
                    <div onclick="switchTab('following')" class="tab-item flex items-center gap-x-3 px-4 py-3 rounded-xl cursor-pointer hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors" data-tab="following">
                        <i class="fa-solid fa-users w-5"></i><span>Following</span>
                    </div>
                    <div onclick="switchTab('discover')" class="tab-item flex items-center gap-x-3 px-4 py-3 rounded-xl cursor-pointer hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors" data-tab="discover">
                        <i class="fa-solid fa-compass w-5"></i><span>Discover</span>
                    </div>
                </div>
            </div>

            <!-- Feed -->
            <div class="flex-1 w-full lg:max-w-[480px] lg:mx-auto">
                <!-- Mobile Tabs -->
                <div class="flex border-b dark:border-zinc-800 bg-white dark:bg-zinc-900 lg:hidden transition-colors duration-200">
                    <div onclick="switchTab('foryou')" class="tab flex-1 text-center py-3 cursor-pointer tab-active" data-tab="foryou">For You</div>
                    <div onclick="switchTab('following')" class="tab flex-1 text-center py-3 cursor-pointer text-gray-500 dark:text-gray-400" data-tab="following">Following</div>
                    <div onclick="switchTab('discover')" class="tab flex-1 text-center py-3 cursor-pointer text-gray-500 dark:text-gray-400" data-tab="discover">Discover</div>
                </div>

                <div id="foryou" class="feed feed-container h-[calc(100vh-112px)] lg:h-[calc(100vh-56px)] overflow-y-auto snap-y snap-mandatory pb-20 lg:pb-0"></div>
                <div id="following" class="feed feed-container h-[calc(100vh-112px)] lg:h-[calc(100vh-56px)] overflow-y-auto snap-y snap-mandatory pb-20 lg:pb-0 hidden"></div>
                <div id="discover" class="feed feed-container h-[calc(100vh-112px)] lg:h-[calc(100vh-56px)] overflow-y-auto snap-y snap-mandatory pb-20 lg:pb-0 hidden"></div>
            </div>
        </div>

        <!-- Mobile Bottom Nav -->
        <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-zinc-900 border-t dark:border-zinc-800 z-50 transition-colors duration-200">
            <div class="flex justify-around items-center h-14">
                <div onclick="switchTab('foryou')" class="flex flex-col items-center text-xs cursor-pointer"><i class="fa-solid fa-home text-xl"></i></div>
                <div onclick="switchTab('discover')" class="flex flex-col items-center text-xs text-gray-500 dark:text-gray-400 cursor-pointer"><i class="fa-solid fa-compass text-xl"></i></div>
                <div onclick="showUploadModal()" class="flex flex-col items-center -mt-5"><div class="bg-black dark:bg-white dark:text-black text-white w-12 h-12 rounded-2xl flex items-center justify-center transition-colors"><i class="fa-solid fa-plus text-xl"></i></div></div>
                <div onclick="switchTab('following')" class="flex flex-col items-center text-xs text-gray-500 dark:text-gray-400 cursor-pointer"><i class="fa-solid fa-users text-xl"></i></div>
                <div onclick="openProfile(currentUser)" class="flex flex-col items-center text-xs cursor-pointer"><i class="fa-solid fa-user text-xl"></i></div>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" onclick="closeProfileModal()" class="hidden fixed inset-0 bg-black/50 z-[60] flex items-end lg:items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="modal-sheet bg-white dark:bg-zinc-900 w-full lg:w-[420px] lg:rounded-2xl rounded-t-3xl transition-colors duration-200">
            <div class="p-6">
                <div class="flex justify-between items-start">
                    <div class="flex gap-4">
                        <div class="relative">
                            <img id="profileAvatar" class="w-16 h-16 rounded-full object-cover cursor-pointer" onclick="changeProfilePicture()">
                            <div onclick="changeProfilePicture()" class="absolute bottom-0 right-0 bg-black dark:bg-white text-white dark:text-black w-5 h-5 rounded-full flex items-center justify-center cursor-pointer">
                                <i class="fa-solid fa-camera text-[9px]"></i>
                            </div>
                        </div>
                        <div>
                            <div id="profileUsername" class="font-semibold text-xl"></div>
                            <div id="profileHandle" class="text-gray-500 dark:text-gray-400"></div>
                            <div id="profileBio" class="text-sm mt-1 text-gray-600 dark:text-gray-400"></div>
                        </div>
                    </div>
                    <button onclick="closeProfileModal()" class="text-2xl text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">×</button>
                </div>

                <div class="flex gap-8 mt-5">
                    <div><div class="font-semibold" id="profileFollowers"></div><div class="text-sm text-gray-500">Followers</div></div>
                    <div><div class="font-semibold" id="profileFollowing"></div><div class="text-sm text-gray-500">Following</div></div>
                    <div><div class="font-semibold" id="profileLikes"></div><div class="text-sm text-gray-500">Likes</div></div>
                </div>

                <div id="profileActions" class="mt-6"></div>

                <div id="editProfileForm" class="hidden mt-4 space-y-3">
                    <input id="editUsername" type="text" placeholder="Username" class="w-full px-4 py-2 border dark:border-zinc-700 rounded-xl bg-white dark:bg-zinc-800 text-sm dark:text-white">
                    <textarea id="editBio" placeholder="Bio" class="w-full px-4 py-2 border dark:border-zinc-700 rounded-xl bg-white dark:bg-zinc-800 text-sm dark:text-white" rows="2"></textarea>
                    <div class="flex gap-2">
                        <button onclick="saveProfileChanges()" class="flex-1 py-2 bg-black dark:bg-white dark:text-black text-white rounded-xl text-sm font-medium">Save</button>
                        <button onclick="cancelEditProfile()" class="flex-1 py-2 border dark:border-zinc-700 rounded-xl text-sm dark:text-white">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" onclick="hideUploadModal()" class="hidden fixed inset-0 bg-black/40 z-50 flex items-end lg:items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="modal-sheet bg-white dark:bg-zinc-900 w-full lg:w-[420px] lg:rounded-2xl rounded-t-3xl p-6 transition-colors duration-200">
            <div class="flex justify-between mb-4">
                <h3 class="font-semibold text-xl">Upload Video</h3>
                <button onclick="hideUploadModal()" class="text-2xl text-gray-400">×</button>
            </div>

            <div class="space-y-4">
                <div id="uploadArea" onclick="document.getElementById('videoFile').click()" 
                     class="border-2 border-dashed border-gray-300 dark:border-zinc-700 rounded-2xl p-8 text-center cursor-pointer hover:border-gray-400 dark:hover:border-zinc-500 transition-colors">
                    <i class="fa-solid fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i>
                    <p class="text-sm font-medium">Click to select video</p>
                    <p class="text-xs text-gray-500 mt-1">MP4 or MOV up to 50MB</p>
                    <input type="file" id="videoFile" accept="video/*" class="hidden" onchange="handleFileSelect()">
                </div>

                <div id="selectedFile" class="hidden items-center gap-2 bg-gray-100 dark:bg-zinc-800 p-3 rounded-xl">
                    <i class="fa-solid fa-video text-gray-500"></i>
                    <span id="fileName" class="text-sm flex-1 truncate"></span>
                    <button onclick="removeSelectedFile()" class="text-red-500 text-sm">×</button>
                </div>

                <div>
                    <label class="text-sm text-gray-500">Description</label>
                    <input id="videoDescription" type="text" class="w-full px-4 py-2 border dark:border-zinc-700 rounded-xl bg-white dark:bg-zinc-800 dark:text-white mt-1" placeholder="What's this video about?">
                </div>

                <button id="uploadBtn" onclick="uploadVideo()" 
                        class="w-full py-3 bg-black dark:bg-white dark:text-black text-white rounded-2xl font-medium flex items-center justify-center gap-2 transition-colors">
                    <span id="uploadBtnText">Upload to Echo</span>
                    <div id="uploadSpinner" class="spinner hidden"></div>
                </button>
            </div>
        </div>
    </div>

    <!-- Comments Sheet -->
    <div id="commentsSheet" onclick="closeCommentsSheet()" class="hidden fixed inset-0 bg-black/50 z-[70] flex items-end lg:items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="modal-sheet bg-white dark:bg-zinc-900 w-full lg:w-[480px] lg:rounded-2xl rounded-t-3xl max-h-[85vh] flex flex-col transition-colors duration-200">
            <div class="p-4 border-b dark:border-zinc-800 flex items-center justify-between">
                <div class="font-semibold">Comments <span id="commentCountBadge" class="text-gray-400 text-sm font-normal"></span></div>
                <button onclick="closeCommentsSheet()" class="text-2xl text-gray-400">×</button>
            </div>

            <div id="commentsList" class="flex-1 overflow-y-auto p-4 space-y-4 min-h-[200px]"></div>

            <div class="p-4 border-t dark:border-zinc-800 flex gap-2 items-center">
                <img id="commentUserAvatar" class="w-8 h-8 rounded-full object-cover flex-shrink-0">
                <input id="commentInput" type="text" placeholder="Add a comment..." 
                       class="flex-1 px-4 py-2 bg-gray-100 dark:bg-zinc-800 rounded-full text-sm focus:outline-none dark:text-white dark:placeholder-gray-500">
                <button onclick="postComment()" 
                        class="px-4 py-2 bg-black dark:bg-white dark:text-black text-white rounded-full text-sm font-medium transition-colors">Post</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBQSPwpVbGrdCuOoyitAeWQHIeipj2MgIY",
            authDomain: "newstart-64c43.firebaseapp.com",
            databaseURL: "https://newstart-64c43-default-rtdb.firebaseio.com",
            projectId: "newstart-64c43",
            storageBucket: "newstart-64c43.firebasestorage.app",
            messagingSenderId: "941619830061",
            appId: "1:941619830061:web:de9e0f791eb8f6eacf87a4"
        };

        const CLOUDINARY_CLOUD_NAME = 'dqkujefxj';
        const CLOUDINARY_UPLOAD_PRESET = 'banter_box';

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUser = null;
        let currentFollowing = {};
        let lastLoadedKey = null;
        let isLoading = false;
        let currentCommentVideoId = null;
        let videoObserver = null;
        let commentLikes = {}; // track which comments current user liked

        // ==================== DARK MODE ====================
        function initDarkMode() {
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            updateThemeIcon();
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark);
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (document.documentElement.classList.contains('dark')) {
                icon.className = 'fa-solid fa-sun text-lg';
            } else {
                icon.className = 'fa-solid fa-moon text-lg';
            }
        }

        // ==================== CLOUDINARY ====================
        async function uploadToCloudinary(file, resourceType = 'video') {
            const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${resourceType}/upload`;
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            const response = await fetch(url, { method: 'POST', body: formData });
            return await response.json();
        }

        // ==================== AUTH ====================
        async function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                await ensureUserInDatabase(result.user);
            } catch (error) {
                alert("Sign in failed: " + error.message);
            }
        }

        async function ensureUserInDatabase(user) {
            const userRef = database.ref(`users/${user.uid}`);
            const snapshot = await userRef.once('value');
            if (!snapshot.exists()) {
                await userRef.set({
                    uid: user.uid,
                    username: user.displayName || user.email.split('@')[0],
                    avatar: user.photoURL || `https://i.pravatar.cc/100?u=${user.uid}`,
                    bio: "Just joined Echo!",
                    followersCount: 0,
                    followingCount: 0,
                    likesCount: 0,
                    createdAt: Date.now()
                });
            }
        }

        function signOut() {
            auth.signOut();
        }

        // ==================== FOLLOW SYSTEM ====================
        async function followUser(targetUid) {
            if (!currentUser || currentUser.uid === targetUid) return;
            await database.ref(`follows/${currentUser.uid}/${targetUid}`).set(true);
            await database.ref(`users/${targetUid}/followersCount`).transaction(c => (c || 0) + 1);
            await database.ref(`users/${currentUser.uid}/followingCount`).transaction(c => (c || 0) + 1);
            currentFollowing[targetUid] = true;
            refreshProfileModal(targetUid);
        }

        async function unfollowUser(targetUid) {
            if (!currentUser) return;
            await database.ref(`follows/${currentUser.uid}/${targetUid}`).remove();
            await database.ref(`users/${targetUid}/followersCount`).transaction(c => Math.max((c || 0) - 1, 0));
            await database.ref(`users/${currentUser.uid}/followingCount`).transaction(c => Math.max((c || 0) - 1, 0));
            delete currentFollowing[targetUid];
            refreshProfileModal(targetUid);
        }

        async function loadCurrentUserFollowing() {
            if (!currentUser) return;
            const snapshot = await database.ref(`follows/${currentUser.uid}`).once('value');
            currentFollowing = snapshot.val() || {};
        }

        // ==================== VIDEO AUTOPLAY ====================
        function setupVideoObserver() {
            if (videoObserver) videoObserver.disconnect();
            videoObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target;
                    if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
                        video.play().catch(() => {});
                        video.muted = false;
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.5 });
        }

        function observeVideos() {
            if (!videoObserver) setupVideoObserver();
            document.querySelectorAll('.feed video').forEach(video => {
                video.loop = true;
                videoObserver.observe(video);
            });
        }

        // ==================== COMMENTS (with replies, likes, delete) ====================
        async function showCommentsSheet(videoId) {
            currentCommentVideoId = videoId;
            const sheet = document.getElementById('commentsSheet');
            const list = document.getElementById('commentsList');
            list.innerHTML = `<div class="flex justify-center p-8"><div class="spinner" style="border-top-color:#6366f1"></div></div>`;
            sheet.classList.remove('hidden');
            sheet.classList.add('flex');

            if (currentUser) {
                document.getElementById('commentUserAvatar').src = currentUser.avatar || 'https://i.pravatar.cc/32';
            }

            // Load comment likes for current user
            if (currentUser) {
                const likesSnap = await database.ref(`commentLikes/${currentUser.uid}`).once('value');
                commentLikes = likesSnap.val() || {};
            }

            await renderComments(videoId, list);
        }

        async function renderComments(videoId, list) {
            list.innerHTML = '';
            const snapshot = await database.ref(`videos/${videoId}/comments`).once('value');

            const countBadge = document.getElementById('commentCountBadge');

            if (!snapshot.exists()) {
                countBadge.textContent = '(0)';
                list.innerHTML = `<div class="text-center text-gray-400 dark:text-gray-500 py-10 text-sm">No comments yet. Be the first!</div>`;
                return;
            }

            const comments = [];
            snapshot.forEach(child => comments.push({ id: child.key, ...child.val() }));
            comments.sort((a, b) => b.timestamp - a.timestamp);
            countBadge.textContent = `(${comments.length})`;

            comments.forEach(comment => {
                list.appendChild(buildCommentEl(comment, videoId, false));
            });
        }

        function buildCommentEl(comment, videoId, isReply) {
            const isOwn = currentUser && currentUser.uid === comment.userId;
            const likeKey = `${videoId}_${comment.id}`;
            const liked = commentLikes[likeKey];
            const likeCount = comment.likesCount || 0;

            const wrapper = document.createElement('div');
            wrapper.className = isReply ? 'flex gap-3 ml-10 mt-3' : 'flex gap-3';
            wrapper.id = `comment-${comment.id}`;

            wrapper.innerHTML = `
                <img src="${comment.avatar || 'https://i.pravatar.cc/32'}" class="w-8 h-8 rounded-full object-cover flex-shrink-0 cursor-pointer" onclick="openProfileById('${comment.userId}', event)">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="font-semibold text-sm cursor-pointer hover:underline" onclick="openProfileById('${comment.userId}', event)">${escapeHtml(comment.username)}</span>
                        <span class="text-xs text-gray-400">${timeAgo(comment.timestamp)}</span>
                    </div>
                    <p class="text-sm mt-0.5 break-words">${escapeHtml(comment.text)}</p>
                    <div class="flex items-center gap-4 mt-1.5">
                        <button onclick="toggleCommentLike(this, '${videoId}', '${comment.id}')" 
                                class="flex items-center gap-1 text-xs text-gray-500 dark:text-gray-400 hover:text-red-500 transition-colors ${liked ? 'text-red-500' : ''}">
                            <i class="fa-${liked ? 'solid' : 'regular'} fa-heart"></i>
                            <span class="like-count">${likeCount > 0 ? likeCount : ''}</span>
                        </button>
                        ${!isReply ? `<button onclick="toggleReplyInput('${comment.id}')" class="text-xs text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors">Reply</button>` : ''}
                        ${isOwn ? `<button onclick="deleteComment('${videoId}', '${comment.id}', ${isReply}, '${comment.parentId || ''}')" class="text-xs text-red-400 hover:text-red-600 transition-colors">Delete</button>` : ''}
                    </div>
                    ${!isReply ? `
                    <div id="reply-input-${comment.id}" class="reply-input-area mt-2 gap-2 items-center">
                        <input type="text" placeholder="Reply to ${escapeHtml(comment.username)}..."
                               class="flex-1 px-3 py-1.5 bg-gray-100 dark:bg-zinc-800 rounded-full text-xs focus:outline-none dark:text-white dark:placeholder-gray-500"
                               onkeydown="if(event.key==='Enter') postReply('${videoId}','${comment.id}',this)">
                        <button onclick="postReply('${videoId}','${comment.id}', this.previousElementSibling)" 
                                class="px-3 py-1.5 bg-black dark:bg-white dark:text-black text-white rounded-full text-xs font-medium">Reply</button>
                    </div>
                    <div id="replies-${comment.id}" class="replies-list space-y-0 mt-1"></div>
                    ${comment.repliesCount > 0 ? `<button onclick="loadReplies('${videoId}','${comment.id}',this)" class="text-xs text-indigo-500 dark:text-indigo-400 mt-1 hover:underline">View ${comment.repliesCount} ${comment.repliesCount===1?'reply':'replies'}</button>` : ''}
                    ` : ''}
                </div>
            `;
            return wrapper;
        }

        function toggleReplyInput(commentId) {
            const el = document.getElementById(`reply-input-${commentId}`);
            if (el) {
                el.classList.toggle('open');
                if (el.classList.contains('open')) {
                    el.querySelector('input').focus();
                }
            }
        }

        async function loadReplies(videoId, commentId, btn) {
            const repliesContainer = document.getElementById(`replies-${commentId}`);
            if (!repliesContainer) return;
            repliesContainer.classList.toggle('open');
            if (!repliesContainer.classList.contains('open')) {
                btn.textContent = btn.textContent.replace('Hide', 'View');
                return;
            }
            btn.textContent = 'Hide replies';
            repliesContainer.innerHTML = '';

            const snap = await database.ref(`videos/${videoId}/comments/${commentId}/replies`).once('value');
            if (!snap.exists()) { repliesContainer.innerHTML = '<p class="ml-10 text-xs text-gray-400 mt-2">No replies yet.</p>'; return; }

            const replies = [];
            snap.forEach(child => replies.push({ id: child.key, parentId: commentId, ...child.val() }));
            replies.sort((a, b) => a.timestamp - b.timestamp);
            replies.forEach(reply => repliesContainer.appendChild(buildCommentEl(reply, videoId, true)));
        }

        async function postReply(videoId, parentCommentId, inputEl) {
            const text = inputEl.value.trim();
            if (!text || !currentUser) return;

            const replyData = {
                userId: currentUser.uid,
                username: currentUser.username,
                avatar: currentUser.avatar,
                text: text,
                likesCount: 0,
                parentId: parentCommentId,
                timestamp: Date.now()
            };

            const replyRef = await database.ref(`videos/${videoId}/comments/${parentCommentId}/replies`).push(replyData);
            await database.ref(`videos/${videoId}/comments/${parentCommentId}/repliesCount`).transaction(c => (c || 0) + 1);
            inputEl.value = '';
            toggleReplyInput(parentCommentId);

            // Reload replies if visible
            const repliesContainer = document.getElementById(`replies-${parentCommentId}`);
            const replyBtn = repliesContainer?.previousElementSibling;
            if (repliesContainer && repliesContainer.classList.contains('open')) {
                // re-load
                repliesContainer.innerHTML = '';
                const snap = await database.ref(`videos/${videoId}/comments/${parentCommentId}/replies`).once('value');
                const replies = [];
                snap.forEach(child => replies.push({ id: child.key, parentId: parentCommentId, ...child.val() }));
                replies.sort((a, b) => a.timestamp - b.timestamp);
                replies.forEach(reply => repliesContainer.appendChild(buildCommentEl(reply, videoId, true)));
            } else if (repliesContainer) {
                // Update count button
                const countEl = repliesContainer.nextElementSibling;
                const snap = await database.ref(`videos/${videoId}/comments/${parentCommentId}/repliesCount`).once('value');
                const count = snap.val() || 0;
                if (countEl && countEl.tagName === 'BUTTON') {
                    countEl.textContent = `View ${count} ${count===1?'reply':'replies'}`;
                }
            }
        }

        async function toggleCommentLike(btn, videoId, commentId) {
            if (!currentUser) return;
            const likeKey = `${videoId}_${commentId}`;
            const liked = commentLikes[likeKey];
            const countEl = btn.querySelector('.like-count');
            const iconEl = btn.querySelector('i');
            const likesRef = database.ref(`videos/${videoId}/comments/${commentId}/likesCount`);

            if (liked) {
                delete commentLikes[likeKey];
                await database.ref(`commentLikes/${currentUser.uid}/${likeKey}`).remove();
                await likesRef.transaction(c => Math.max((c || 0) - 1, 0));
                btn.classList.remove('text-red-500');
                iconEl.className = 'fa-regular fa-heart';
            } else {
                commentLikes[likeKey] = true;
                await database.ref(`commentLikes/${currentUser.uid}/${likeKey}`).set(true);
                await likesRef.transaction(c => (c || 0) + 1);
                btn.classList.add('text-red-500');
                iconEl.className = 'fa-solid fa-heart';
            }

            const snap = await likesRef.once('value');
            const newCount = snap.val() || 0;
            countEl.textContent = newCount > 0 ? newCount : '';
        }

        async function deleteComment(videoId, commentId, isReply, parentId) {
            if (!currentUser) return;
            if (!confirm('Delete this comment?')) return;

            if (isReply && parentId) {
                await database.ref(`videos/${videoId}/comments/${parentId}/replies/${commentId}`).remove();
                await database.ref(`videos/${videoId}/comments/${parentId}/repliesCount`).transaction(c => Math.max((c || 0) - 1, 0));
                const el = document.getElementById(`comment-${commentId}`);
                if (el) el.remove();
            } else {
                await database.ref(`videos/${videoId}/comments/${commentId}`).remove();
                await database.ref(`videos/${videoId}/commentsCount`).transaction(c => Math.max((c || 0) - 1, 0));
                // Re-render comments
                const list = document.getElementById('commentsList');
                await renderComments(videoId, list);
                // Update count on video card
                const countEl = document.getElementById(`comments-${videoId}`);
                if (countEl) {
                    const snap = await database.ref(`videos/${videoId}/commentsCount`).once('value');
                    countEl.textContent = snap.val() || 0;
                }
            }
        }

        function closeCommentsSheet() {
            const sheet = document.getElementById('commentsSheet');
            sheet.classList.remove('flex');
            sheet.classList.add('hidden');
            document.getElementById('commentInput').value = '';
            currentCommentVideoId = null;
        }

        async function postComment() {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (!text || !currentCommentVideoId || !currentUser) return;

            const commentData = {
                userId: currentUser.uid,
                username: currentUser.username,
                avatar: currentUser.avatar,
                text: text,
                likesCount: 0,
                repliesCount: 0,
                timestamp: Date.now()
            };

            await database.ref(`videos/${currentCommentVideoId}/comments`).push(commentData);
            await database.ref(`videos/${currentCommentVideoId}/commentsCount`).transaction(c => (c || 0) + 1);
            input.value = '';
            const list = document.getElementById('commentsList');
            await renderComments(currentCommentVideoId, list);
            const countEl = document.getElementById(`comments-${currentCommentVideoId}`);
            if (countEl) {
                const snap = await database.ref(`videos/${currentCommentVideoId}/commentsCount`).once('value');
                countEl.textContent = snap.val() || 0;
            }
        }

        // ==================== PROFILE ====================
        async function openProfile(user) {
            if (!user) return;
            const modal = document.getElementById('profileModal');
            const snapshot = await database.ref(`users/${user.uid}`).once('value');
            const userData = snapshot.val() || user;

            document.getElementById('profileAvatar').src = userData.avatar || 'https://i.pravatar.cc/100';
            document.getElementById('profileUsername').textContent = userData.username;
            document.getElementById('profileHandle').textContent = '@' + userData.username;
            document.getElementById('profileBio').textContent = userData.bio || '';
            document.getElementById('profileFollowers').textContent = userData.followersCount || 0;
            document.getElementById('profileFollowing').textContent = userData.followingCount || 0;
            document.getElementById('profileLikes').textContent = userData.likesCount || 0;

            const actionsDiv = document.getElementById('profileActions');
            actionsDiv.innerHTML = '';
            document.getElementById('editProfileForm').classList.add('hidden');

            const isOwnProfile = currentUser && currentUser.uid === user.uid;

            if (isOwnProfile) {
                actionsDiv.innerHTML = `
                    <button onclick="showEditProfileForm()" class="w-full py-2.5 bg-black dark:bg-white dark:text-black text-white rounded-full font-medium text-sm transition-colors">Edit Profile</button>
                    <button onclick="signOut()" class="mt-2 w-full py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-full font-medium text-sm transition-colors">Sign Out</button>
                `;
            } else {
                const isFollowing = currentFollowing[user.uid];
                actionsDiv.innerHTML = `
                    <button onclick="${isFollowing ? 'unfollowUser' : 'followUser'}('${user.uid}')" 
                            class="w-full py-2.5 ${isFollowing ? 'bg-gray-200 dark:bg-zinc-700 text-black dark:text-white' : 'bg-black dark:bg-white dark:text-black text-white'} rounded-full font-medium text-sm transition-colors">
                        ${isFollowing ? 'Following' : 'Follow'}
                    </button>
                `;
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function showEditProfileForm() {
            document.getElementById('profileActions').classList.add('hidden');
            document.getElementById('editProfileForm').classList.remove('hidden');
            document.getElementById('editUsername').value = document.getElementById('profileUsername').textContent;
            document.getElementById('editBio').value = document.getElementById('profileBio').textContent;
        }

        async function saveProfileChanges() {
            if (!currentUser) return;
            const newUsername = document.getElementById('editUsername').value.trim();
            const newBio = document.getElementById('editBio').value.trim();
            if (!newUsername) return alert("Username cannot be empty");

            // Only update username and bio — avatar is unchanged
            await database.ref(`users/${currentUser.uid}`).update({ username: newUsername, bio: newBio });
            currentUser.username = newUsername;
            currentUser.bio = newBio;
            // navAvatar stays the same (already set from currentUser.avatar)

            closeProfileModal();
            setTimeout(() => openProfile(currentUser), 300);
        }

        function cancelEditProfile() {
            document.getElementById('editProfileForm').classList.add('hidden');
            document.getElementById('profileActions').classList.remove('hidden');
        }

        async function changeProfilePicture() {
            if (!currentUser) return;
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const result = await uploadToCloudinary(file, 'image');
                    const newAvatar = result.secure_url;
                    await database.ref(`users/${currentUser.uid}/avatar`).set(newAvatar);
                    currentUser.avatar = newAvatar;
                    document.getElementById('navAvatar').src = newAvatar;
                    document.getElementById('profileAvatar').src = newAvatar;
                } catch (err) {
                    alert("Failed to upload image");
                }
            };
            input.click();
        }

        function refreshProfileModal(uid) {
            closeProfileModal();
            setTimeout(() => {
                if (currentUser && currentUser.uid === uid) openProfile(currentUser);
            }, 400);
        }

        function closeProfileModal() {
            const modal = document.getElementById('profileModal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
            document.getElementById('editProfileForm').classList.add('hidden');
            document.getElementById('profileActions').classList.remove('hidden');
        }

        // ==================== VIDEO DELETION ====================
        async function deleteVideo(videoId) {
            if (!currentUser) return;
            if (!confirm('Delete this video? This cannot be undone.')) return;

            await database.ref(`videos/${videoId}`).remove();

            const card = document.getElementById(`video-card-${videoId}`);
            if (card) card.remove();
        }

        // ==================== UPLOAD ====================
        let selectedFile = null;

        function handleFileSelect() {
            const fileInput = document.getElementById('videoFile');
            const selectedDiv = document.getElementById('selectedFile');
            const fileNameSpan = document.getElementById('fileName');
            if (fileInput.files.length > 0) {
                selectedFile = fileInput.files[0];
                fileNameSpan.textContent = selectedFile.name;
                selectedDiv.classList.remove('hidden');
                selectedDiv.classList.add('flex');
            }
        }

        function removeSelectedFile() {
            selectedFile = null;
            document.getElementById('videoFile').value = '';
            document.getElementById('selectedFile').classList.add('hidden');
            document.getElementById('selectedFile').classList.remove('flex');
        }

        async function uploadVideo() {
            const uploadBtn = document.getElementById('uploadBtn');
            const btnText = document.getElementById('uploadBtnText');
            const spinner = document.getElementById('uploadSpinner');
            const description = document.getElementById('videoDescription').value.trim();

            if (!selectedFile || !currentUser) { alert("Please select a video file"); return; }

            uploadBtn.disabled = true;
            uploadBtn.classList.add('opacity-70');
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');

            try {
                const result = await uploadToCloudinary(selectedFile, 'video');
                const newVideoRef = database.ref('videos').push();
                await newVideoRef.set({
                    userId: currentUser.uid,
                    username: currentUser.username,
                    avatar: currentUser.avatar,
                    description: description || "New video",
                    videoUrl: result.secure_url,
                    likes: 0,
                    commentsCount: 0,
                    timestamp: Date.now()
                });
                hideUploadModal();
                selectedFile = null;
                switchTab('foryou');
            } catch (error) {
                alert("Upload failed: " + error.message);
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.classList.remove('opacity-70');
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        }

        function showUploadModal() {
            document.getElementById('uploadModal').classList.remove('hidden');
            document.getElementById('uploadModal').classList.add('flex');
            document.getElementById('selectedFile').classList.add('hidden');
            document.getElementById('videoDescription').value = '';
        }

        function hideUploadModal() {
            document.getElementById('uploadModal').classList.remove('flex');
            document.getElementById('uploadModal').classList.add('hidden');
            document.getElementById('videoFile').value = '';
            document.getElementById('selectedFile').classList.add('hidden');
            selectedFile = null;
        }

        // ==================== RENDER VIDEOS ====================
        function renderVideo(video, container) {
            const isOwn = currentUser && currentUser.uid === video.userId;
            const div = document.createElement('div');
            div.className = 'video-card flex justify-center py-2 lg:py-4 snap-start';
            div.id = `video-card-${video.id}`;

            div.innerHTML = `
                <div class="w-full px-0 lg:max-w-[480px] lg:px-2">
                    <div class="relative bg-black rounded-none lg:rounded-3xl overflow-hidden shadow-sm video-container mx-auto">
                        <video src="${video.videoUrl}" class="w-full h-full object-cover" muted loop playsinline></video>
                        
                        <div class="absolute bottom-0 left-0 right-0 p-4 video-overlay text-white">
                            <div>
                                <div class="flex items-center gap-x-2">
                                    <span onclick="openProfileById('${video.userId}', event)" class="font-semibold cursor-pointer hover:underline">${escapeHtml(video.username)}</span>
                                </div>
                                <p class="text-sm mt-1 line-clamp-2 opacity-90">${escapeHtml(video.description || '')}</p>
                            </div>
                        </div>

                        <div class="absolute right-3 bottom-20 flex flex-col items-center gap-y-5 text-white">
                            <div onclick="openProfileById('${video.userId}', event)" class="cursor-pointer">
                                <img src="${video.avatar || 'https://i.pravatar.cc/40'}" class="w-10 h-10 rounded-full border-2 border-white object-cover">
                            </div>

                            <div onclick="likeVideo(this, '${video.id}')" class="flex flex-col items-center cursor-pointer group">
                                <i class="fa-solid fa-heart text-3xl group-hover:scale-110 transition-transform"></i>
                                <span class="text-xs font-medium mt-0.5" id="likes-${video.id}">${formatCount(video.likes || 0)}</span>
                            </div>

                            <div onclick="showCommentsSheet('${video.id}')" class="flex flex-col items-center cursor-pointer group">
                                <i class="fa-solid fa-comment-dots text-3xl group-hover:scale-110 transition-transform"></i>
                                <span class="text-xs font-medium mt-0.5" id="comments-${video.id}">${video.commentsCount || 0}</span>
                            </div>

                            ${isOwn ? `
                            <div onclick="deleteVideo('${video.id}')" class="flex flex-col items-center cursor-pointer group" title="Delete video">
                                <i class="fa-solid fa-trash text-2xl text-red-400 group-hover:text-red-300 group-hover:scale-110 transition-all"></i>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        function formatCount(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        function timeAgo(timestamp) {
            const diff = Date.now() - timestamp;
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs}h ago`;
            return `${Math.floor(hrs / 24)}d ago`;
        }

        // ==================== LIKE ====================
        async function likeVideo(element, videoId) {
            const likesRef = database.ref(`videos/${videoId}/likes`);
            const countEl = element.querySelector('span');
            const result = await likesRef.transaction(current => (current || 0) + 1);
            if (result.committed) {
                countEl.textContent = formatCount(result.snapshot.val());
            }
        }

        // ==================== LOAD VIDEOS ====================
        async function loadVideos(tab) {
            const container = document.getElementById(tab);
            container.innerHTML = '';
            lastLoadedKey = null;

            const snapshot = await database.ref('videos').orderByKey().limitToLast(6).once('value');

            if (!snapshot.exists()) {
                container.innerHTML = `<div class="p-8 text-center text-gray-400">No videos yet.</div>`;
                return;
            }

            let videos = [];
            snapshot.forEach(child => videos.unshift({ id: child.key, ...child.val() }));

            if (tab === 'following') {
                videos = videos.filter(v => currentFollowing[v.userId]);
                if (videos.length === 0) {
                    container.innerHTML = `<div class="p-8 text-center text-gray-400">No videos from people you follow yet.</div>`;
                    return;
                }
            }

            videos.forEach(video => renderVideo(video, container));
            if (videos.length > 0) lastLoadedKey = videos[videos.length - 1].id;
            observeVideos();
        }

        async function loadMoreVideos(tab) {
            if (isLoading || !lastLoadedKey) return;
            isLoading = true;
            const container = document.getElementById(tab);
            const query = database.ref('videos').orderByKey().endBefore(lastLoadedKey).limitToLast(4);
            const snapshot = await query.once('value');

            if (!snapshot.exists()) { isLoading = false; return; }

            let videos = [];
            snapshot.forEach(child => videos.unshift({ id: child.key, ...child.val() }));

            if (tab === 'following') videos = videos.filter(v => currentFollowing[v.userId]);

            videos.forEach(video => renderVideo(video, container));
            if (videos.length > 0) lastLoadedKey = videos[videos.length - 1].id;
            observeVideos();
            isLoading = false;
        }

        function setupInfiniteScroll(tab) {
            const container = document.getElementById(tab);
            container.addEventListener('scroll', () => {
                if (container.scrollTop + container.clientHeight >= container.scrollHeight - 300) {
                    loadMoreVideos(tab);
                }
            });
        }

        // ==================== TABS ====================
        function switchTab(tab) {
            document.querySelectorAll('.feed').forEach(f => f.classList.add('hidden'));
            document.getElementById(tab).classList.remove('hidden');

            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('tab-active', 'text-black', 'dark:text-white');
                t.classList.add('text-gray-500', 'dark:text-gray-400');
                if (t.getAttribute('data-tab') === tab) {
                    t.classList.add('tab-active', 'text-black', 'dark:text-white');
                    t.classList.remove('text-gray-500', 'dark:text-gray-400');
                }
            });

            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('bg-gray-100', 'dark:bg-zinc-800');
                if (item.getAttribute('data-tab') === tab) {
                    item.classList.add('bg-gray-100', 'dark:bg-zinc-800');
                }
            });

            loadVideos(tab);
        }

        function openProfileById(uid, event) {
            if (event) event.stopImmediatePropagation();
            database.ref(`users/${uid}`).once('value').then(snapshot => {
                const userData = snapshot.val();
                if (userData) openProfile(userData);
            });
        }

        // ==================== INIT ====================
        function initApp() {
            initDarkMode();
            setupVideoObserver();

            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    const userSnapshot = await database.ref(`users/${user.uid}`).once('value');
                    currentUser = userSnapshot.val() || {
                        uid: user.uid,
                        username: user.displayName || user.email.split('@')[0],
                        avatar: user.photoURL || 'https://i.pravatar.cc/32'
                    };

                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    document.getElementById('navAvatar').src = currentUser.avatar;

                    await loadCurrentUserFollowing();
                    loadVideos('foryou');
                    setupInfiniteScroll('foryou');
                    setupInfiniteScroll('following');
                    setupInfiniteScroll('discover');

                    const defaultTab = document.querySelector('.tab-item[data-tab="foryou"]');
                    if (defaultTab) defaultTab.classList.add('bg-gray-100', 'dark:bg-zinc-800');

                } else {
                    document.getElementById('mainApp').classList.add('hidden');
                    document.getElementById('loginScreen').classList.remove('hidden');
                    currentUser = null;
                    currentFollowing = {};
                }
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
